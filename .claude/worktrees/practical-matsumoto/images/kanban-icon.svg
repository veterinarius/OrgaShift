<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="col1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="col2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="col3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="cardshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern overlay -->
  <rect width="512" height="512" rx="96" ry="96" fill="rgba(255,255,255,0.05)"/>

  <!-- Decorative circle top right -->
  <circle cx="440" cy="80" r="120" fill="rgba(255,255,255,0.07)" clip-path="url(#roundedRect)"/>
  <circle cx="80" cy="440" r="100" fill="rgba(255,255,255,0.05)" clip-path="url(#roundedRect)"/>

  <!-- Board columns group (centered) -->
  <!-- Column 1 -->
  <g filter="url(#cardshadow)">
    <rect x="68" y="140" width="108" height="240" rx="12" fill="rgba(255,255,255,0.18)"/>
    <!-- Card 1 -->
    <rect x="80" y="158" width="84" height="36" rx="7" fill="url(#col1)"/>
    <rect x="88" y="165" width="50" height="5" rx="2.5" fill="#6366f1"/>
    <rect x="88" y="175" width="36" height="4" rx="2" fill="#c7d2fe"/>
    <!-- Card 2 -->
    <rect x="80" y="202" width="84" height="36" rx="7" fill="url(#col1)"/>
    <rect x="88" y="209" width="40" height="5" rx="2.5" fill="#6366f1"/>
    <rect x="88" y="219" width="56" height="4" rx="2" fill="#c7d2fe"/>
    <!-- Card 3 -->
    <rect x="80" y="246" width="84" height="36" rx="7" fill="url(#col1)"/>
    <rect x="88" y="253" width="60" height="5" rx="2.5" fill="#6366f1"/>
    <rect x="88" y="263" width="30" height="4" rx="2" fill="#c7d2fe"/>
    <!-- Label dot -->
    <circle cx="152" cy="162" r="5" fill="#34d399"/>
    <circle cx="152" cy="206" r="5" fill="#f59e0b"/>
    <circle cx="152" cy="250" r="5" fill="#f87171"/>
  </g>

  <!-- Column 2 -->
  <g filter="url(#cardshadow)">
    <rect x="202" y="140" width="108" height="240" rx="12" fill="rgba(255,255,255,0.18)"/>
    <!-- Card 1 -->
    <rect x="214" y="158" width="84" height="36" rx="7" fill="url(#col2)"/>
    <rect x="222" y="165" width="55" height="5" rx="2.5" fill="#8b5cf6"/>
    <rect x="222" y="175" width="42" height="4" rx="2" fill="#ddd6fe"/>
    <!-- Card 2 -->
    <rect x="214" y="202" width="84" height="36" rx="7" fill="url(#col2)"/>
    <rect x="222" y="209" width="44" height="5" rx="2.5" fill="#8b5cf6"/>
    <rect x="222" y="219" width="60" height="4" rx="2" fill="#ddd6fe"/>
    <!-- Label dot -->
    <circle cx="286" cy="162" r="5" fill="#60a5fa"/>
    <circle cx="286" cy="206" r="5" fill="#34d399"/>
  </g>

  <!-- Column 3 -->
  <g filter="url(#cardshadow)">
    <rect x="336" y="140" width="108" height="240" rx="12" fill="rgba(255,255,255,0.18)"/>
    <!-- Card 1 -->
    <rect x="348" y="158" width="84" height="36" rx="7" fill="url(#col3)"/>
    <rect x="356" y="165" width="48" height="5" rx="2.5" fill="#6366f1"/>
    <rect x="356" y="175" width="62" height="4" rx="2" fill="#c7d2fe"/>
    <!-- Checkmark decoration -->
    <circle cx="420" cy="162" r="5" fill="#34d399"/>
    <!-- Check icon -->
    <polyline points="417,162 419,165 424,159" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Column headers -->
  <rect x="68" y="116" width="108" height="20" rx="6" fill="rgba(255,255,255,0.25)"/>
  <rect x="202" y="116" width="108" height="20" rx="6" fill="rgba(255,255,255,0.25)"/>
  <rect x="336" y="116" width="108" height="20" rx="6" fill="rgba(255,255,255,0.25)"/>

  <!-- Header text bars -->
  <rect x="80" y="121" width="60" height="8" rx="4" fill="rgba(255,255,255,0.8)"/>
  <rect x="214" y="121" width="72" height="8" rx="4" fill="rgba(255,255,255,0.8)"/>
  <rect x="348" y="121" width="50" height="8" rx="4" fill="rgba(255,255,255,0.8)"/>
</svg>
