<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KanFlow – Projektmanagement</title>
  <link rel="icon" href="images/kanban-icon.svg" type="image/svg+xml">
  <style>
    /* ─── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #20243a;
      --border:     rgba(255,255,255,0.08);
      --text:       #e2e8f0;
      --text-muted: #94a3b8;
      --accent:     #6366f1;
      --accent2:    #8b5cf6;
      --accent-glow:rgba(99,102,241,0.35);
      --red:        #f87171;
      --orange:     #fb923c;
      --yellow:     #fbbf24;
      --green:      #34d399;
      --blue:       #60a5fa;
      --purple:     #a78bfa;
      --pink:       #f472b6;
      --card-w:     272px;
      --radius:     12px;
      --radius-sm:  8px;
      --shadow:     0 4px 24px rgba(0,0,0,0.4);
      --shadow-sm:  0 2px 8px rgba(0,0,0,0.25);
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }
    html { font-size: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }
    button { cursor: pointer; font: inherit; border: none; background: none; }
    input, textarea { font: inherit; }
    ::selection { background: var(--accent); color: white; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 99px; }

    /* ─── Views ────────────────────────────────────── */
    .view { display: none; flex-direction: column; min-height: 100vh; }
    .view.active { display: flex; }

    /* ─── App Header ────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .app-logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }
    .app-logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }
    .header-spacer { flex: 1; }

    /* ─── Dashboard ─────────────────────────────────── */
    #dashboard .app-header { }
    .dashboard-main {
      padding: 40px 32px;
      flex: 1;
    }
    .dashboard-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .dashboard-sub {
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .boards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }
    .board-card {
      position: relative;
      height: 140px;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: var(--shadow-sm);
    }
    .board-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .board-card-bg {
      position: absolute;
      inset: 0;
      background: var(--color);
    }
    .board-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.5));
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .board-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .board-card-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.75);
      margin-top: 3px;
    }
    .board-card-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .board-card:hover .board-card-actions { opacity: 1; }
    .board-card-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(0,0,0,0.4);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      transition: background var(--transition);
    }
    .board-card-btn:hover { background: rgba(0,0,0,0.65); }
    .new-board-btn {
      height: 140px;
      border-radius: var(--radius);
      border: 2px dashed var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition), background var(--transition);
      font-size: 0.9rem;
    }
    .new-board-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }
    .new-board-icon {
      font-size: 1.5rem;
      font-weight: 300;
    }

    /* ─── Board View ────────────────────────────────── */
    #board-view {
      background: var(--board-bg, linear-gradient(135deg, #1a1d27, #20243a));
    }
    .board-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.8);
      font-size: 0.875rem;
      padding: 6px 12px;
      border-radius: 7px;
      background: rgba(255,255,255,0.1);
      transition: background var(--transition);
    }
    .back-btn:hover { background: rgba(255,255,255,0.18); }
    .board-title-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .board-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: white;
      background: none;
      border: none;
      outline: none;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background var(--transition);
      max-width: 340px;
    }
    .board-name:hover, .board-name:focus {
      background: rgba(255,255,255,0.1);
    }
    .board-header-actions { display: flex; gap: 8px; }
    .btn-sm {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      transition: background var(--transition), opacity var(--transition);
    }
    .btn-danger { background: rgba(248,113,113,0.15); color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,0.25); }

    /* ─── Lists Container ───────────────────────────── */
    .lists-container {
      display: flex;
      gap: 14px;
      padding: 20px 20px 32px;
      overflow-x: auto;
      flex: 1;
      align-items: flex-start;
    }

    /* ─── List ──────────────────────────────────────── */
    .list {
      flex-shrink: 0;
      width: var(--card-w);
      background: rgba(0,0,0,0.35);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 130px);
    }
    .list-header {
      display: flex;
      align-items: center;
      padding: 12px 12px 10px;
      gap: 8px;
    }
    .list-title {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
      background: none;
      border: none;
      outline: none;
      padding: 4px 6px;
      border-radius: 5px;
      transition: background var(--transition);
    }
    .list-title:hover, .list-title:focus { background: rgba(255,255,255,0.08); }
    .list-count {
      font-size: 0.72rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.08);
      padding: 2px 7px;
      border-radius: 99px;
      min-width: 22px;
      text-align: center;
    }
    .list-menu-btn {
      color: var(--text-muted);
      font-size: 1rem;
      padding: 4px;
      border-radius: 5px;
      transition: background var(--transition), color var(--transition);
    }
    .list-menu-btn:hover { background: rgba(255,255,255,0.1); color: white; }

    /* ─── Cards ─────────────────────────────────────── */
    .cards-area {
      padding: 0 8px;
      overflow-y: auto;
      flex: 1;
      min-height: 8px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      position: relative;
    }
    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.15);
    }
    .card.dragging {
      opacity: 0.5;
      transform: rotate(1.5deg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .card-cover {
      height: 6px;
      border-radius: 3px;
      margin-bottom: 8px;
      margin: -10px -12px 10px -12px;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    }
    .card-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }
    .card-label {
      height: 6px;
      min-width: 40px;
      border-radius: 99px;
    }
    .card-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .card-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.06);
      padding: 2px 8px;
      border-radius: 99px;
    }
    .card-badge.overdue { color: var(--red); background: rgba(248,113,113,0.12); }
    .card-badge.done    { color: var(--green); background: rgba(52,211,153,0.12); }
    .card-edit-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border-radius: 5px;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .card:hover .card-edit-btn { opacity: 1; }

    /* ─── Add Card ──────────────────────────────────── */
    .add-card-area {
      padding: 8px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .add-card-form { display: none; flex-direction: column; gap: 8px; }
    .add-card-form.visible { display: flex; }
    .add-card-input {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 9px 11px;
      font-size: 0.875rem;
      resize: none;
      outline: none;
      min-height: 68px;
    }
    .add-card-actions { display: flex; gap: 8px; align-items: center; }
    .btn-primary {
      background: var(--accent);
      color: white;
      padding: 7px 16px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      transition: opacity var(--transition), transform var(--transition);
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-ghost {
      color: var(--text-muted);
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 0.8rem;
      transition: background var(--transition), color var(--transition);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .add-card-trigger {
      width: 100%;
      text-align: left;
      color: rgba(255,255,255,0.55);
      font-size: 0.85rem;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      transition: background var(--transition), color var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .add-card-trigger:hover { background: rgba(255,255,255,0.08); color: white; }

    /* ─── Add List ──────────────────────────────────── */
    .add-list-wrap {
      flex-shrink: 0;
      width: 260px;
    }
    .add-list-form { display: none; flex-direction: column; gap: 8px; }
    .add-list-form.visible { display: flex; }
    .add-list-input {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      color: white;
      padding: 9px 12px;
      font-size: 0.9rem;
      outline: none;
    }
    .add-list-trigger {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background var(--transition), color var(--transition);
    }
    .add-list-trigger:hover { background: rgba(255,255,255,0.1); color: white; }

    /* ─── Drop Zone ─────────────────────────────────── */
    .drop-zone {
      min-height: 8px;
      transition: min-height var(--transition);
    }
    .drop-zone.drag-over {
      min-height: 68px;
      background: rgba(99,102,241,0.12);
      border: 2px dashed rgba(99,102,241,0.4);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }

    /* ─── Modals ────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
      width: 100%;
      max-width: 580px;
      position: relative;
      animation: slideUp 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
    }
    .modal-close:hover { background: rgba(255,255,255,0.08); color: white; }

    /* ─── New Board Modal ───────────────────────────── */
    .new-board-modal .modal-body { padding: 28px; }
    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--accent); }
    .form-group { margin-bottom: 18px; }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .color-swatch {
      height: 44px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      border: 3px solid transparent;
      position: relative;
    }
    .color-swatch:hover { transform: scale(1.06); }
    .color-swatch.selected {
      border-color: white;
      box-shadow: 0 0 0 2px var(--accent);
    }
    .color-swatch.selected::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    /* ─── Card Detail Modal ─────────────────────────── */
    .card-modal-header {
      border-radius: 16px 16px 0 0;
      padding: 20px 48px 20px 24px;
      background: var(--card-cover-color, var(--surface2));
      min-height: 56px;
      display: flex;
      align-items: flex-start;
    }
    .card-modal-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: white;
      background: none;
      border: none;
      outline: none;
      width: 100%;
      resize: none;
      line-height: 1.4;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background var(--transition);
      min-height: 36px;
    }
    .card-modal-title:hover, .card-modal-title:focus {
      background: rgba(255,255,255,0.1);
    }
    .card-modal-body {
      padding: 20px 24px 24px;
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 24px;
    }
    .card-modal-main { }
    .card-modal-section { margin-bottom: 22px; }
    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-desc {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.875rem;
      resize: vertical;
      outline: none;
      min-height: 90px;
      transition: border-color var(--transition);
    }
    .card-desc:focus { border-color: var(--accent); }

    /* Labels */
    .label-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .label-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      border: 2px solid transparent;
      transition: transform var(--transition), box-shadow var(--transition);
      color: white;
    }
    .label-chip:hover { transform: scale(1.05); }
    .label-chip.active { border-color: white; box-shadow: 0 0 0 2px var(--accent-glow); }

    /* Checklist */
    .checklist-items { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .checklist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 7px;
      transition: background var(--transition);
    }
    .checklist-item:hover { background: rgba(255,255,255,0.04); }
    .check-box {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid rgba(255,255,255,0.3);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), border-color var(--transition);
    }
    .check-box.checked {
      background: var(--green);
      border-color: var(--green);
    }
    .check-box.checked::after { content: '✓'; color: white; font-size: 0.65rem; font-weight: 700; }
    .checklist-text {
      flex: 1;
      font-size: 0.85rem;
      color: var(--text);
      background: none;
      border: none;
      outline: none;
      padding: 2px 0;
      border-bottom: 1px solid transparent;
      transition: border-color var(--transition);
    }
    .checklist-text.done { text-decoration: line-through; color: var(--text-muted); }
    .checklist-text:focus { border-bottom-color: var(--accent); }
    .checklist-del { color: var(--text-muted); font-size: 0.8rem; opacity: 0; transition: opacity var(--transition); }
    .checklist-item:hover .checklist-del { opacity: 1; }
    .checklist-progress { margin-bottom: 10px; }
    .checklist-bar-wrap {
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      height: 5px;
      overflow: hidden;
    }
    .checklist-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 99px;
      transition: width 0.3s ease;
    }
    .checklist-pct { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 5px; }
    .add-checklist-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .add-checklist-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 7px 10px;
      font-size: 0.83rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .add-checklist-input:focus { border-color: var(--accent); }

    /* Sidebar */
    .card-modal-sidebar { }
    .sidebar-section { margin-bottom: 16px; }
    .sidebar-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    .sidebar-btn {
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 0.83rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background var(--transition);
      border: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .sidebar-btn:hover { background: rgba(255,255,255,0.1); }
    .date-input-wrap {
      position: relative;
    }
    .date-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.83rem;
      outline: none;
      transition: border-color var(--transition);
      color-scheme: dark;
    }
    .date-input:focus { border-color: var(--accent); }
    .cover-color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .cover-swatch {
      width: 30px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform var(--transition);
    }
    .cover-swatch:hover { transform: scale(1.12); }
    .cover-swatch.active { border-color: white; }
    .cover-swatch.none-swatch {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--text-muted);
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .delete-card-btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      background: rgba(248,113,113,0.1);
      color: var(--red);
      font-size: 0.83rem;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(248,113,113,0.2);
      transition: background var(--transition);
    }
    .delete-card-btn:hover { background: rgba(248,113,113,0.2); }
    .list-in-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── List Context Menu ─────────────────────────── */
    .ctx-menu {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      z-index: 300;
      min-width: 180px;
      overflow: hidden;
      animation: fadeIn 0.12s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .ctx-menu-item {
      padding: 9px 14px;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background var(--transition);
    }
    .ctx-menu-item:hover { background: rgba(255,255,255,0.07); }
    .ctx-menu-item.danger { color: var(--red); }
    .ctx-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ─── Toast ─────────────────────────────────────── */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: var(--shadow);
      animation: toastIn 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }

    /* ─── Empty State ───────────────────────────────── */
    .empty-boards {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-boards-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
    .empty-boards-text { font-size: 1rem; margin-bottom: 6px; }
    .empty-boards-sub { font-size: 0.85rem; }

    /* ─── Search / Filter Bar ───────────────────────── */
    .dashboard-toolbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
    }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px 8px 34px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .search-input:focus { border-color: var(--accent); }

    /* ─── Responsive ─────────────────────────────────── */
    @media (max-width: 640px) {
      .card-modal-body { grid-template-columns: 1fr; }
      .boards-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .color-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     DASHBOARD VIEW
═══════════════════════════════════════════════════ -->
<div id="dashboard" class="view active">
  <header class="app-header">
    <a class="app-logo" href="#">
      <img src="images/kanban-icon.svg" alt="KanFlow">
      <span class="app-logo-text">KanFlow</span>
    </a>
    <div class="header-spacer"></div>
  </header>

  <main class="dashboard-main">
    <h1 class="dashboard-title">Deine Projekte</h1>
    <p class="dashboard-sub">Verwalte deine Aufgaben, Ziele und Projekte an einem Ort.</p>

    <div class="dashboard-toolbar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Projekte durchsuchen…">
      </div>
    </div>

    <div class="boards-grid" id="boardsGrid">
      <!-- populated by JS -->
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════
     BOARD VIEW
═══════════════════════════════════════════════════ -->
<div id="board-view" class="view">
  <header class="board-header">
    <button class="back-btn" id="backBtn">← Dashboard</button>
    <div class="board-title-wrap">
      <input class="board-name" id="boardName" type="text" value="">
    </div>
    <div class="board-header-actions">
      <button class="btn-sm btn-danger" id="deleteBoardBtn">🗑 Board löschen</button>
    </div>
  </header>

  <div class="lists-container" id="listsContainer">
    <!-- Lists populated by JS -->
    <div class="add-list-wrap" id="addListWrap">
      <button class="add-list-trigger" id="addListTrigger">
        <span>＋</span> Liste hinzufügen
      </button>
      <div class="add-list-form" id="addListForm">
        <input class="add-list-input" id="addListInput" type="text" placeholder="Listentitel…" maxlength="50">
        <div class="add-card-actions">
          <button class="btn-primary" id="addListConfirm">Liste erstellen</button>
          <button class="btn-ghost" id="addListCancel">✕</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     NEW BOARD MODAL
═══════════════════════════════════════════════════ -->
<div class="modal-overlay" id="newBoardOverlay">
  <div class="modal new-board-modal">
    <button class="modal-close" id="closeBoardModal">✕</button>
    <div class="modal-body">
      <h2 class="modal-title">Neues Projekt erstellen</h2>

      <div class="form-group">
        <label class="form-label">Projektname</label>
        <input class="form-input" id="newBoardTitle" type="text" placeholder="z.B. Q2 Marketing Kampagne…" maxlength="60">
      </div>

      <div class="form-group">
        <label class="form-label">Hintergrundfarbe</label>
        <div class="color-grid" id="colorGrid">
          <!-- populated by JS -->
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-ghost" id="cancelBoardBtn">Abbrechen</button>
        <button class="btn-primary" id="createBoardBtn">Projekt erstellen</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     CARD DETAIL MODAL
═══════════════════════════════════════════════════ -->
<div class="modal-overlay" id="cardModalOverlay">
  <div class="modal" id="cardModal">
    <button class="modal-close" id="closeCardModal">✕</button>
    <div class="card-modal-header" id="cardModalHeader">
      <textarea class="card-modal-title" id="cardModalTitle" rows="2" placeholder="Kartentitel…"></textarea>
    </div>
    <div class="card-modal-body">
      <div class="card-modal-main">
        <p class="list-in-label" id="cardInList"></p>

        <!-- Description -->
        <div class="card-modal-section">
          <p class="section-title">📝 Beschreibung</p>
          <textarea class="card-desc" id="cardDesc" placeholder="Beschreibung hinzufügen…"></textarea>
        </div>

        <!-- Labels -->
        <div class="card-modal-section">
          <p class="section-title">🏷 Labels</p>
          <div class="label-picker" id="labelPicker"><!-- JS --></div>
        </div>

        <!-- Checklist -->
        <div class="card-modal-section">
          <p class="section-title">☑ Checkliste</p>
          <div class="checklist-progress" id="checklistProgress" style="display:none">
            <p class="checklist-pct" id="checklistPct">0%</p>
            <div class="checklist-bar-wrap">
              <div class="checklist-bar" id="checklistBar" style="width:0%"></div>
            </div>
          </div>
          <div class="checklist-items" id="checklistItems"></div>
          <div class="add-checklist-row">
            <input class="add-checklist-input" id="newCheckItem" type="text" placeholder="Eintrag hinzufügen…">
            <button class="btn-primary" id="addCheckItem" style="white-space:nowrap">＋ Add</button>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="card-modal-sidebar">
        <div class="sidebar-section">
          <p class="sidebar-label">Fälligkeitsdatum</p>
          <input class="date-input" id="cardDueDate" type="date">
        </div>

        <div class="sidebar-section">
          <p class="sidebar-label">Cover-Farbe</p>
          <div class="cover-color-grid" id="coverColorGrid"><!-- JS --></div>
        </div>

        <div class="sidebar-section" style="margin-top: 20px;">
          <button class="delete-card-btn" id="deleteCardBtn">🗑 Karte löschen</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu" style="display:none"></div>

<script>
/* ═══════════════════════════════════════════════════
   STATE & STORAGE
═══════════════════════════════════════════════════ */
const STORAGE_KEY = 'kanflow_v1';

function loadData() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { boards: [] };
  } catch { return { boards: [] }; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadData();
let activeBoardId = null;
let activeCardId   = null;
let activeListId   = null;
let dragCard       = null;
let selectedColor  = null;

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function getBoard(id) { return state.boards.find(b => b.id === id); }
function getList(board, id) { return board.lists.find(l => l.id === id); }
function getCard(list, id) { return list.cards.find(c => c.id === id); }

const BOARD_COLORS = [
  'linear-gradient(135deg,#6366f1,#8b5cf6)',
  'linear-gradient(135deg,#0ea5e9,#6366f1)',
  'linear-gradient(135deg,#10b981,#0ea5e9)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#ec4899,#8b5cf6)',
  'linear-gradient(135deg,#14b8a6,#6366f1)',
  'linear-gradient(135deg,#f97316,#ef4444)',
  'linear-gradient(135deg,#a3e635,#10b981)',
  'linear-gradient(135deg,#64748b,#334155)',
  'linear-gradient(135deg,#e11d48,#ec4899)',
];

const LABELS = [
  { id:'red',    color:'#f87171', name:'Dringend'  },
  { id:'orange', color:'#fb923c', name:'Wichtig'   },
  { id:'yellow', color:'#fbbf24', name:'Geplant'   },
  { id:'green',  color:'#34d399', name:'Fertig'    },
  { id:'blue',   color:'#60a5fa', name:'Review'    },
  { id:'purple', color:'#a78bfa', name:'Feature'   },
  { id:'pink',   color:'#f472b6', name:'Idee'      },
];

const COVER_COLORS = [
  null,
  '#6366f1','#8b5cf6','#0ea5e9','#10b981',
  '#f59e0b','#ef4444','#ec4899','#14b8a6',
];

/* ═══════════════════════════════════════════════════
   VIEW SWITCHING
═══════════════════════════════════════════════════ */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
function showToast(msg, type='success') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

/* ═══════════════════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════════════════ */
function showCtxMenu(x, y, items) {
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = '';
  items.forEach(item => {
    if (item === '---') {
      const d = document.createElement('div');
      d.className = 'ctx-menu-divider';
      menu.appendChild(d);
    } else {
      const el = document.createElement('div');
      el.className = 'ctx-menu-item' + (item.danger ? ' danger' : '');
      el.textContent = item.label;
      el.addEventListener('click', () => { hideCtxMenu(); item.action(); });
      menu.appendChild(el);
    }
  });
  menu.style.display = 'block';
  menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - menu.offsetHeight - 8) + 'px';
}
function hideCtxMenu() { document.getElementById('ctxMenu').style.display = 'none'; }
document.addEventListener('click', hideCtxMenu);
document.addEventListener('keydown', e => { if(e.key === 'Escape') hideCtxMenu(); });

/* ═══════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════ */
function renderDashboard(filter='') {
  const grid = document.getElementById('boardsGrid');
  grid.innerHTML = '';

  const boards = filter
    ? state.boards.filter(b => b.title.toLowerCase().includes(filter.toLowerCase()))
    : state.boards;

  if (boards.length === 0 && !filter) {
    const empty = document.createElement('div');
    empty.className = 'empty-boards';
    empty.innerHTML = `
      <div class="empty-boards-icon">📋</div>
      <p class="empty-boards-text">Noch keine Projekte</p>
      <p class="empty-boards-sub">Erstelle dein erstes Projekt, um loszulegen.</p>`;
    grid.appendChild(empty);
  } else {
    boards.forEach(board => {
      const totalCards = board.lists.reduce((n, l) => n + l.cards.length, 0);
      const card = document.createElement('div');
      card.className = 'board-card';
      card.innerHTML = `
        <div class="board-card-bg" style="background:${board.color}"></div>
        <div class="board-card-overlay">
          <div class="board-card-title">${esc(board.title)}</div>
          <div class="board-card-meta">${board.lists.length} Listen · ${totalCards} Karten</div>
        </div>
        <div class="board-card-actions">
          <button class="board-card-btn" title="Board löschen">🗑</button>
        </div>`;
      card.querySelector('.board-card-btn').addEventListener('click', e => {
        e.stopPropagation();
        if (confirm(`Projekt „${board.title}" wirklich löschen?`)) {
          state.boards = state.boards.filter(b => b.id !== board.id);
          saveData();
          renderDashboard();
          showToast('Projekt gelöscht');
        }
      });
      card.addEventListener('click', () => openBoard(board.id));
      grid.appendChild(card);
    });
  }

  // "New board" button always at end
  const newBtn = document.createElement('button');
  newBtn.className = 'new-board-btn';
  newBtn.innerHTML = '<span class="new-board-icon">＋</span>Neues Projekt';
  newBtn.addEventListener('click', openNewBoardModal);
  grid.appendChild(newBtn);
}

document.getElementById('searchInput').addEventListener('input', e => renderDashboard(e.target.value));

/* ═══════════════════════════════════════════════════
   NEW BOARD MODAL
═══════════════════════════════════════════════════ */
function buildColorGrid() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  selectedColor = BOARD_COLORS[0];
  BOARD_COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (i === 0 ? ' selected' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      selectedColor = c;
    });
    grid.appendChild(sw);
  });
}

function openNewBoardModal() {
  buildColorGrid();
  document.getElementById('newBoardTitle').value = '';
  document.getElementById('newBoardOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newBoardTitle').focus(), 60);
}
function closeNewBoardModal() {
  document.getElementById('newBoardOverlay').classList.remove('open');
}

document.getElementById('closeBoardModal').addEventListener('click', closeNewBoardModal);
document.getElementById('cancelBoardBtn').addEventListener('click', closeNewBoardModal);
document.getElementById('newBoardOverlay').addEventListener('click', e => {
  if(e.target === e.currentTarget) closeNewBoardModal();
});

document.getElementById('createBoardBtn').addEventListener('click', () => {
  const title = document.getElementById('newBoardTitle').value.trim();
  if (!title) { document.getElementById('newBoardTitle').focus(); return; }
  const board = {
    id: uid(),
    title,
    color: selectedColor || BOARD_COLORS[0],
    lists: [
      { id: uid(), title: 'Aufgaben',     cards: [] },
      { id: uid(), title: 'In Bearbeitung', cards: [] },
      { id: uid(), title: 'Erledigt',     cards: [] },
    ],
  };
  state.boards.push(board);
  saveData();
  closeNewBoardModal();
  renderDashboard();
  showToast(`„${title}" erstellt`);
  openBoard(board.id);
});

document.getElementById('newBoardTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('createBoardBtn').click();
});

/* ═══════════════════════════════════════════════════
   BOARD VIEW
═══════════════════════════════════════════════════ */
function openBoard(boardId) {
  activeBoardId = boardId;
  const board = getBoard(boardId);
  if (!board) return;

  document.getElementById('board-view').style.background = board.color;
  document.getElementById('boardName').value = board.title;
  renderBoard();
  showView('board-view');
}

document.getElementById('backBtn').addEventListener('click', () => {
  showView('dashboard');
  renderDashboard();
});

document.getElementById('boardName').addEventListener('change', e => {
  const board = getBoard(activeBoardId);
  if (!board) return;
  board.title = e.target.value.trim() || board.title;
  saveData();
  showToast('Name gespeichert');
});

document.getElementById('deleteBoardBtn').addEventListener('click', () => {
  const board = getBoard(activeBoardId);
  if (!board) return;
  if (!confirm(`Projekt „${board.title}" wirklich löschen?`)) return;
  state.boards = state.boards.filter(b => b.id !== activeBoardId);
  saveData();
  showView('dashboard');
  renderDashboard();
  showToast('Projekt gelöscht');
});

/* ─── Render Board ──────────────────────────────── */
function renderBoard() {
  const board = getBoard(activeBoardId);
  if (!board) return;
  const container = document.getElementById('listsContainer');
  const addWrap   = document.getElementById('addListWrap');

  // Remove existing lists (but not addWrap)
  container.querySelectorAll('.list').forEach(el => el.remove());

  // Insert lists before addWrap
  board.lists.forEach(list => {
    const el = buildList(list);
    container.insertBefore(el, addWrap);
  });
}

function buildList(list) {
  const board = getBoard(activeBoardId);
  const el = document.createElement('div');
  el.className = 'list';
  el.dataset.listId = list.id;

  // Header
  const header = document.createElement('div');
  header.className = 'list-header';

  const titleInput = document.createElement('input');
  titleInput.className = 'list-title';
  titleInput.type = 'text';
  titleInput.value = list.title;
  titleInput.maxLength = 50;
  titleInput.addEventListener('change', () => {
    list.title = titleInput.value.trim() || list.title;
    saveData();
    updateListCount(el, list);
  });

  const countBadge = document.createElement('span');
  countBadge.className = 'list-count';
  countBadge.textContent = list.cards.length;

  const menuBtn = document.createElement('button');
  menuBtn.className = 'list-menu-btn';
  menuBtn.textContent = '···';
  menuBtn.addEventListener('click', e => {
    e.stopPropagation();
    showCtxMenu(e.clientX, e.clientY, [
      {
        label: '✏️ Liste umbenennen', action: () => {
          titleInput.select();
          titleInput.focus();
        }
      },
      { label: '📋 Alle Karten archivieren', action: () => {
        list.cards = [];
        saveData();
        renderBoard();
        showToast('Karten archiviert');
      }},
      '---',
      { label: '🗑 Liste löschen', danger: true, action: () => {
        board.lists = board.lists.filter(l => l.id !== list.id);
        saveData();
        renderBoard();
        showToast('Liste gelöscht');
      }},
    ]);
  });

  header.append(titleInput, countBadge, menuBtn);

  // Cards area
  const cardsArea = document.createElement('div');
  cardsArea.className = 'cards-area';
  cardsArea.dataset.listId = list.id;

  list.cards.forEach(card => {
    cardsArea.appendChild(buildCardEl(card, list.id));
  });

  setupDropZone(cardsArea);

  // Add card area
  const addCardArea = document.createElement('div');
  addCardArea.className = 'add-card-area';

  const addForm = document.createElement('div');
  addForm.className = 'add-card-form';

  const addInput = document.createElement('textarea');
  addInput.className = 'add-card-input';
  addInput.placeholder = 'Kartentitel eingeben…';
  addInput.rows = 3;

  const addActions = document.createElement('div');
  addActions.className = 'add-card-actions';

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-primary';
  addBtn.textContent = 'Karte hinzufügen';
  addBtn.addEventListener('click', () => {
    const t = addInput.value.trim();
    if (!t) return;
    const card = { id: uid(), title: t, description: '', labels: [], dueDate: null, checklist: [], cover: null };
    list.cards.push(card);
    saveData();
    cardsArea.appendChild(buildCardEl(card, list.id));
    updateListCount(el, list);
    addInput.value = '';
    addInput.focus();
  });

  addInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addBtn.click(); }
    if (e.key === 'Escape') cancelBtn.click();
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-ghost';
  cancelBtn.textContent = '✕';
  cancelBtn.addEventListener('click', () => {
    addForm.classList.remove('visible');
    trigger.style.display = '';
    addInput.value = '';
  });

  addActions.append(addBtn, cancelBtn);
  addForm.append(addInput, addActions);

  const trigger = document.createElement('button');
  trigger.className = 'add-card-trigger';
  trigger.innerHTML = '<span>＋</span> Karte hinzufügen';
  trigger.addEventListener('click', () => {
    addForm.classList.add('visible');
    trigger.style.display = 'none';
    setTimeout(() => addInput.focus(), 40);
  });

  addCardArea.append(trigger, addForm);
  el.append(header, cardsArea, addCardArea);
  return el;
}

function updateListCount(listEl, list) {
  const badge = listEl.querySelector('.list-count');
  if (badge) badge.textContent = list.cards.length;
}

/* ─── Build Card Element ────────────────────────── */
function buildCardEl(card, listId) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.cardId = card.id;
  el.dataset.listId = listId;

  // Cover
  if (card.cover) {
    const cover = document.createElement('div');
    cover.className = 'card-cover';
    cover.style.background = card.cover;
    el.appendChild(cover);
  }

  // Labels row
  if (card.labels && card.labels.length > 0) {
    const labelsRow = document.createElement('div');
    labelsRow.className = 'card-labels';
    card.labels.forEach(lid => {
      const lbl = LABELS.find(l => l.id === lid);
      if (lbl) {
        const chip = document.createElement('div');
        chip.className = 'card-label';
        chip.style.background = lbl.color;
        chip.title = lbl.name;
        labelsRow.appendChild(chip);
      }
    });
    el.appendChild(labelsRow);
  }

  // Title
  const title = document.createElement('div');
  title.className = 'card-title';
  title.textContent = card.title;
  el.appendChild(title);

  // Footer (badges)
  const hasDue = !!card.dueDate;
  const doneItems = (card.checklist || []).filter(i => i.checked).length;
  const totalItems = (card.checklist || []).length;
  const hasCheck = totalItems > 0;

  if (hasDue || hasCheck) {
    const footer = document.createElement('div');
    footer.className = 'card-footer';
    if (hasDue) {
      const dueBadge = document.createElement('div');
      const now = new Date();
      const due = new Date(card.dueDate);
      const overdue = due < now;
      const doneDue = doneItems === totalItems && totalItems > 0;
      dueBadge.className = 'card-badge' + (overdue && !doneDue ? ' overdue' : '') + (doneDue ? ' done' : '');
      dueBadge.textContent = '📅 ' + formatDate(card.dueDate);
      footer.appendChild(dueBadge);
    }
    if (hasCheck) {
      const checkBadge = document.createElement('div');
      checkBadge.className = 'card-badge' + (doneItems === totalItems ? ' done' : '');
      checkBadge.textContent = `☑ ${doneItems}/${totalItems}`;
      footer.appendChild(checkBadge);
    }
    el.appendChild(footer);
  }

  // Edit btn
  const editBtn = document.createElement('button');
  editBtn.className = 'card-edit-btn';
  editBtn.textContent = '✏️';
  editBtn.title = 'Bearbeiten';
  editBtn.addEventListener('click', e => { e.stopPropagation(); openCardModal(card.id, listId); });
  el.appendChild(editBtn);

  // Click to open
  el.addEventListener('click', () => openCardModal(card.id, listId));

  // Drag & Drop
  el.addEventListener('dragstart', e => {
    dragCard = { cardId: card.id, fromListId: listId };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragCard = null;
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
  });

  return el;
}

/* ─── Drag & Drop ───────────────────────────────── */
function setupDropZone(cardsArea) {
  const dz = document.createElement('div');
  dz.className = 'drop-zone';
  cardsArea.appendChild(dz);

  cardsArea.addEventListener('dragover', e => {
    if (!dragCard) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
    dz.classList.add('drag-over');
  });

  cardsArea.addEventListener('drop', e => {
    e.preventDefault();
    if (!dragCard) return;
    const board = getBoard(activeBoardId);
    const { cardId, fromListId } = dragCard;
    const toListId = cardsArea.dataset.listId;

    if (fromListId === toListId) { dz.classList.remove('drag-over'); return; }

    const fromList = getList(board, fromListId);
    const toList   = getList(board, toListId);
    const cardIdx  = fromList.cards.findIndex(c => c.id === cardId);
    if (cardIdx < 0) return;

    const [card] = fromList.cards.splice(cardIdx, 1);
    toList.cards.push(card);
    saveData();
    renderBoard();
  });

  cardsArea.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
}

/* ─── Add List ──────────────────────────────────── */
document.getElementById('addListTrigger').addEventListener('click', () => {
  document.getElementById('addListForm').classList.add('visible');
  document.getElementById('addListTrigger').style.display = 'none';
  setTimeout(() => document.getElementById('addListInput').focus(), 40);
});

document.getElementById('addListCancel').addEventListener('click', () => {
  document.getElementById('addListForm').classList.remove('visible');
  document.getElementById('addListTrigger').style.display = '';
  document.getElementById('addListInput').value = '';
});

document.getElementById('addListConfirm').addEventListener('click', () => {
  const title = document.getElementById('addListInput').value.trim();
  if (!title) return;
  const board = getBoard(activeBoardId);
  const list  = { id: uid(), title, cards: [] };
  board.lists.push(list);
  saveData();

  const addWrap = document.getElementById('addListWrap');
  const container = document.getElementById('listsContainer');
  container.insertBefore(buildList(list), addWrap);

  document.getElementById('addListInput').value = '';
  document.getElementById('addListInput').focus();
});

document.getElementById('addListInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addListConfirm').click();
  if (e.key === 'Escape') document.getElementById('addListCancel').click();
});

/* ═══════════════════════════════════════════════════
   CARD MODAL
═══════════════════════════════════════════════════ */
function openCardModal(cardId, listId) {
  const board = getBoard(activeBoardId);
  const list  = getList(board, listId);
  const card  = getCard(list, cardId);
  if (!card) return;

  activeCardId = cardId;
  activeListId = listId;

  // Header cover
  const header = document.getElementById('cardModalHeader');
  header.style.background = card.cover || 'var(--surface2)';

  // Title
  document.getElementById('cardModalTitle').value = card.title;
  document.getElementById('cardInList').textContent = `In Liste: ${list.title}`;

  // Desc
  document.getElementById('cardDesc').value = card.description || '';

  // Labels
  buildLabelPicker(card);

  // Checklist
  renderChecklist(card);

  // Due date
  document.getElementById('cardDueDate').value = card.dueDate || '';

  // Cover colors
  buildCoverColorGrid(card);

  document.getElementById('cardModalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('cardModalTitle').focus(), 60);
}

function closeCardModal() {
  document.getElementById('cardModalOverlay').classList.remove('open');
  // Refresh board
  const board = getBoard(activeBoardId);
  if (board) renderBoard();
}

document.getElementById('closeCardModal').addEventListener('click', closeCardModal);
document.getElementById('cardModalOverlay').addEventListener('click', e => {
  if(e.target === e.currentTarget) closeCardModal();
});

// Title save
document.getElementById('cardModalTitle').addEventListener('input', debounce(() => {
  const board = getBoard(activeBoardId);
  const list  = getList(board, activeListId);
  const card  = getCard(list, activeCardId);
  if (!card) return;
  card.title = document.getElementById('cardModalTitle').value.trim() || card.title;
  saveData();
}, 400));

// Desc save
document.getElementById('cardDesc').addEventListener('input', debounce(() => {
  const board = getBoard(activeBoardId);
  const list  = getList(board, activeListId);
  const card  = getCard(list, activeCardId);
  if (!card) return;
  card.description = document.getElementById('cardDesc').value;
  saveData();
}, 500));

// Due date
document.getElementById('cardDueDate').addEventListener('change', e => {
  const board = getBoard(activeBoardId);
  const list  = getList(board, activeListId);
  const card  = getCard(list, activeCardId);
  if (!card) return;
  card.dueDate = e.target.value || null;
  saveData();
});

// Delete card
document.getElementById('deleteCardBtn').addEventListener('click', () => {
  const board = getBoard(activeBoardId);
  const list  = getList(board, activeListId);
  if (!list) return;
  list.cards = list.cards.filter(c => c.id !== activeCardId);
  saveData();
  closeCardModal();
  showToast('Karte gelöscht');
});

/* ─── Labels ────────────────────────────────────── */
function buildLabelPicker(card) {
  const picker = document.getElementById('labelPicker');
  picker.innerHTML = '';
  LABELS.forEach(lbl => {
    const chip = document.createElement('div');
    chip.className = 'label-chip' + ((card.labels||[]).includes(lbl.id) ? ' active' : '');
    chip.style.background = lbl.color + '33';
    chip.style.border = `2px solid ${lbl.color}66`;
    chip.innerHTML = `<span style="width:10px;height:10px;border-radius:99px;background:${lbl.color};display:inline-block;"></span> ${esc(lbl.name)}`;
    chip.style.color = lbl.color;
    chip.addEventListener('click', () => {
      const board = getBoard(activeBoardId);
      const list  = getList(board, activeListId);
      const card2 = getCard(list, activeCardId);
      if (!card2) return;
      card2.labels = card2.labels || [];
      if (card2.labels.includes(lbl.id)) {
        card2.labels = card2.labels.filter(l => l !== lbl.id);
        chip.classList.remove('active');
      } else {
        card2.labels.push(lbl.id);
        chip.classList.add('active');
      }
      saveData();
    });
    picker.appendChild(chip);
  });
}

/* ─── Checklist ─────────────────────────────────── */
function renderChecklist(card) {
  const items = document.getElementById('checklistItems');
  items.innerHTML = '';
  (card.checklist || []).forEach((item, idx) => {
    items.appendChild(buildCheckItem(card, item, idx));
  });
  updateChecklistProgress(card);
}

function buildCheckItem(card, item, idx) {
  const row = document.createElement('div');
  row.className = 'checklist-item';

  const box = document.createElement('button');
  box.className = 'check-box' + (item.checked ? ' checked' : '');
  box.addEventListener('click', () => {
    item.checked = !item.checked;
    box.className = 'check-box' + (item.checked ? ' checked' : '');
    textEl.className = 'checklist-text' + (item.checked ? ' done' : '');
    saveData();
    updateChecklistProgress(card);
  });

  const textEl = document.createElement('input');
  textEl.className = 'checklist-text' + (item.checked ? ' done' : '');
  textEl.type = 'text';
  textEl.value = item.text;
  textEl.addEventListener('change', () => {
    item.text = textEl.value;
    saveData();
  });

  const delBtn = document.createElement('button');
  delBtn.className = 'checklist-del';
  delBtn.textContent = '✕';
  delBtn.title = 'Löschen';
  delBtn.addEventListener('click', () => {
    card.checklist.splice(idx, 1);
    saveData();
    renderChecklist(card);
  });

  row.append(box, textEl, delBtn);
  return row;
}

function updateChecklistProgress(card) {
  const total = (card.checklist || []).length;
  const done  = (card.checklist || []).filter(i => i.checked).length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const prog = document.getElementById('checklistProgress');
  prog.style.display = total ? '' : 'none';
  document.getElementById('checklistPct').textContent = pct + '%';
  document.getElementById('checklistBar').style.width = pct + '%';
}

document.getElementById('addCheckItem').addEventListener('click', () => {
  const input = document.getElementById('newCheckItem');
  const text = input.value.trim();
  if (!text) return;
  const board = getBoard(activeBoardId);
  const list  = getList(board, activeListId);
  const card  = getCard(list, activeCardId);
  if (!card) return;
  card.checklist = card.checklist || [];
  card.checklist.push({ id: uid(), text, checked: false });
  saveData();
  renderChecklist(card);
  input.value = '';
  input.focus();
});

document.getElementById('newCheckItem').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addCheckItem').click();
});

/* ─── Cover Colors ──────────────────────────────── */
function buildCoverColorGrid(card) {
  const grid = document.getElementById('coverColorGrid');
  grid.innerHTML = '';
  COVER_COLORS.forEach(color => {
    const sw = document.createElement('div');
    if (color) {
      sw.className = 'cover-swatch' + (card.cover === color ? ' active' : '');
      sw.style.background = color;
    } else {
      sw.className = 'cover-swatch none-swatch' + (!card.cover ? ' active' : '');
      sw.textContent = '✕';
    }
    sw.addEventListener('click', () => {
      const board2 = getBoard(activeBoardId);
      const list2  = getList(board2, activeListId);
      const card2  = getCard(list2, activeCardId);
      if (!card2) return;
      card2.cover = color;
      saveData();
      const header = document.getElementById('cardModalHeader');
      header.style.background = color || 'var(--surface2)';
      grid.querySelectorAll('.cover-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
    grid.appendChild(sw);
  });
}

/* ═══════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════ */
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' });
}

function debounce(fn, delay) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
}

/* ═══════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('cardModalOverlay').classList.contains('open')) closeCardModal();
    if (document.getElementById('newBoardOverlay').classList.contains('open')) closeNewBoardModal();
  }
});

   INIT

renderDashboard();
