<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrgaShift – Dashboard</title>
    <style>
        /* ── DESIGN TOKENS ── */
        :root {
            --color-accent: #007AFF;
            --color-text: #f0f0f5;
            --color-text-muted: #8e8e99;
            --color-surface: rgba(18,18,28,0.92);
            --color-surface-glass: rgba(255,255,255,0.07);
            --color-border: rgba(255,255,255,0.1);
            --color-bg: #0a0a0f;
            --color-nav-bg: rgba(8,8,16,0.88);
            --color-nav-border: rgba(255,255,255,0.08);
            --radius: 14px;
            --shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* ── LIGHT MODE ── */
        body.light {
            --color-text: #1a1a2e;
            --color-text-muted: #5a6376;
            --color-surface: rgba(255,255,255,0.92);
            --color-surface-glass: rgba(0,0,0,0.04);
            --color-border: rgba(0,0,0,0.1);
            --color-bg: #e8edf5;
            --color-nav-bg: rgba(255,255,255,0.88);
            --color-nav-border: rgba(0,0,0,0.1);
        }
        body.light { background: var(--color-bg); }
        body.light nav { border-bottom-color: var(--color-nav-border); }
        body.light .logo { color: var(--color-accent); }
        body.light .nav-links a { color: var(--color-text); }
        body.light .theme-toggle { border-color: rgba(0,0,0,0.15); }
        body.light .dashboard-card { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        body.light .card-icon { background: rgba(0,122,255,0.1); }
        body.light .card-title { color: var(--color-text); }
        body.light .card-desc { color: var(--color-text-muted); }
        body.light .card-arrow { color: var(--color-text-muted); }
        body.light .greeting { color: var(--color-text); }
        body.light .greeting-sub { color: var(--color-text-muted); }
        body.light #beamsOverlay { animation: overlayPulseLight 10s ease-in-out infinite; }
        @keyframes overlayPulseLight {
            0%, 100% { background: rgba(232,237,245,0.2); }
            50%       { background: rgba(232,237,245,0.4); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--color-bg, #0a0a0f);
            transition: background 0.3s ease;
            min-height: 100vh;
            color: var(--color-text);
            overflow-x: hidden;
        }

        /* ── BEAMS BACKGROUND ── */
        #beamsCanvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            filter: blur(15px);
            z-index: 0;
            pointer-events: none;
        }
        #beamsOverlay {
            position: fixed; inset: 0;
            z-index: 1;
            pointer-events: none;
            backdrop-filter: blur(50px);
            animation: overlayPulse 10s ease-in-out infinite;
        }
        @keyframes overlayPulse {
            0%, 100% { background: rgba(10,10,15,0.05); }
            50%       { background: rgba(10,10,15,0.15); }
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; width: 100%;
            background: var(--color-nav-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--color-nav-border);
            z-index: 1000;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            display: flex; justify-content: space-between; align-items: center; height: 60px;
        }
        .logo {
            font-size: 22px; font-weight: 700; color: var(--color-text);
            text-decoration: none; letter-spacing: -0.02em;
        }
        .logo-dot { color: var(--color-accent); }
        .nav-links { display: flex; list-style: none; gap: 24px; }
        .nav-links a {
            text-decoration: none; color: var(--color-text);
            font-size: 0.9rem; opacity: 0.7; transition: opacity 0.2s, color 0.2s;
        }
        .nav-links a:hover { opacity: 1; color: var(--color-accent); }
        .nav-right { display: flex; gap: 8px; align-items: center; }
        .theme-toggle {
            background: none; border: 1px solid var(--color-border); border-radius: 50%;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; transition: background 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }
        .theme-toggle:hover { background: var(--color-surface-glass); }
        .btn-logout {
            background: rgba(255,59,48,0.12); border: 1px solid rgba(255,59,48,0.25);
            color: #ff3b30; padding: 7px 14px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 500; cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-logout:hover { background: rgba(255,59,48,0.22); border-color: rgba(255,59,48,0.4); }

        /* ── PAGE LAYOUT ── */
        .page-wrap {
            position: relative; z-index: 2;
            min-height: 100vh;
            padding: 100px 24px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── GREETING ── */
        .greeting-block {
            margin-bottom: 48px;
            text-align: center;
        }
        .greeting {
            font-size: 2rem; font-weight: 700;
            color: var(--color-text);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .greeting-sub {
            font-size: 1rem;
            color: var(--color-text-muted);
        }

        /* ── DASHBOARD GRID ── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                max-width: 420px;
            }
            .greeting { font-size: 1.6rem; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ── CARD ── */
        .dashboard-card {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 28px 24px;
            background: var(--color-surface-glass);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .dashboard-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        .dashboard-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(0,122,255,0.35);
            background: rgba(0,122,255,0.06);
        }
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .card-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: rgba(0,122,255,0.15);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .card-icon svg {
            width: 22px; height: 22px;
            stroke: var(--color-accent);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .card-arrow {
            color: var(--color-text-muted);
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }
        .dashboard-card:hover .card-arrow {
            opacity: 1;
            color: var(--color-accent);
            transform: translateX(3px);
        }
        .card-arrow svg {
            width: 18px; height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .card-body {}
        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 4px;
        }
        .card-desc {
            font-size: 0.82rem;
            color: var(--color-text-muted);
            line-height: 1.45;
        }
    </style>
</head>
<body>

<!-- Beams Background -->
<canvas id="beamsCanvas"></canvas>
<div id="beamsOverlay"></div>

<!-- Nav -->
<nav>
    <div class="nav-container">
        <a class="logo" href="#">Orga<span class="logo-dot">Shift</span></a>
        <ul class="nav-links">
            <li><a href="monatsplanneu.html">Monatsplan</a></li>
            <li><a href="wochenplanneu.html">Wochenplan</a></li>
            <li><a href="urlaubMA.html">Mein Urlaub</a></li>
        </ul>
        <div class="nav-right">

<!-- Main Content -->

        <div class="greeting">Willkommen zurück</div>

        <a class="dashboard-card" href="wochenplanneu.html">

                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </div>
            </div>

        <a class="dashboard-card" href="urlaubMA.html">

    </div>
</div>

<script>
    /* ── THEME TOGGLE ── */
    (function() {
        var btn = document.getElementById('themeToggle');
        function applyTheme(t) {
            if (t === 'light') document.body.classList.add('light');
            else document.body.classList.remove('light');
            btn.textContent = t === 'light' ? '☀️' : '🌙';
            try { localStorage.setItem('theme', t); } catch(e) {}
        }
        var saved = null;
        try { saved = localStorage.getItem('theme'); } catch(e) {}
        if (saved === 'light' || saved === 'dark') {
            applyTheme(saved);
        } else {
            applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        }
        btn.addEventListener('click', function() {
            applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
        });
    })();

    /* ── LOGOUT ── */
    function logout() {
        window.location.href = 'index.html';
    }

    /* ── BEAMS BACKGROUND ── */
    (function() {
        const canvas = document.getElementById('beamsCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const beams = Array.from({ length: 6 }, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            r: 180 + Math.random() * 220,
            dx: (Math.random() - 0.5) * 0.4,
            dy: (Math.random() - 0.5) * 0.4,
            hue: [210, 220, 200, 240, 195][Math.floor(Math.random() * 5)],
        }));

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            beams.forEach(b => {
                const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
                grad.addColorStop(0, `hsla(${b.hue}, 80%, 55%, 0.18)`);
                grad.addColorStop(1, `hsla(${b.hue}, 80%, 55%, 0)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();

                b.x += b.dx;
                b.y += b.dy;
                if (b.x < -b.r || b.x > canvas.width + b.r) b.dx *= -1;
                if (b.y < -b.r || b.y > canvas.height + b.r) b.dy *= -1;
            });
            requestAnimationFrame(draw);
        }
        draw();
    })();
</script>
</body>
