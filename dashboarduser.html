<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrgaShift 2 – Dashboard User</title>
    <style>
        /* ── DESIGN TOKENS ── */
        :root {
            --color-accent: #007AFF;
            --color-text: #f0f0f5;
            --color-text-muted: #8e8e99;
            --color-surface: rgba(18,18,28,0.92);
            --color-surface-glass: rgba(255,255,255,0.07);
            --color-border: rgba(255,255,255,0.1);
            --color-bg: #0a0a0f;
            --color-nav-bg: rgba(8,8,16,0.88);
            --color-nav-border: rgba(255,255,255,0.08);
            --radius: 14px;
            --shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* ── LIGHT MODE ── */
        body.light {
            --color-text: #1a1a2e;
            --color-text-muted: #5a6376;
            --color-surface: rgba(255,255,255,0.92);
            --color-surface-glass: rgba(0,0,0,0.04);
            --color-border: rgba(0,0,0,0.1);
            --color-bg: #e8edf5;
            --color-nav-bg: rgba(255,255,255,0.88);
            --color-nav-border: rgba(0,0,0,0.1);
        }
        body.light { background: var(--color-bg); }
        body.light nav { border-bottom-color: var(--color-nav-border); }
        body.light .logo { color: var(--color-accent); }
        body.light .nav-links a { color: var(--color-text); }
        body.light .theme-toggle { border-color: rgba(0,0,0,0.15); }
        body.light .dashboard-card { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        body.light .card-icon { background: rgba(0,122,255,0.1); }
        body.light .card-title { color: var(--color-text); }
        body.light .card-desc { color: var(--color-text-muted); }
        body.light .card-arrow { color: var(--color-text-muted); }
        body.light .greeting { color: var(--color-text); }
        body.light .greeting-sub { color: var(--color-text-muted); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--color-bg, #0a0a0f);
            transition: background 0.3s ease;
            min-height: 100vh;
            color: var(--color-text);
            overflow-x: hidden;
        }

        /* ── BEAMS BACKGROUND ── */
        #beamsCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; display: block;
            filter: blur(15px);
            z-index: 0;
            pointer-events: none;
        }
        #beamsOverlay {
            position: fixed; inset: 0;
            z-index: 1;
            pointer-events: none;
            background: rgba(10,10,10,0.05);
            animation: overlayPulse 10s ease-in-out infinite;
            backdrop-filter: blur(50px);
        }
        @keyframes overlayPulse {
            0%, 100% { opacity: 0.05; }
            50%       { opacity: 0.15; }
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; width: 100%;
            background: var(--color-nav-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--color-nav-border);
            z-index: 1000;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            display: flex; justify-content: space-between; align-items: center; height: 60px;
        }
        .logo {
            font-size: 22px; font-weight: 700; color: var(--color-text);
            text-decoration: none; letter-spacing: -0.02em;
        }
        .logo-dot { color: var(--color-accent); }
        .nav-links { display: flex; list-style: none; gap: 24px; }
        .nav-links a {
            text-decoration: none; color: var(--color-text);
            font-size: 0.9rem; opacity: 0.7; transition: opacity 0.2s, color 0.2s;
        }
        .nav-links a:hover { opacity: 1; color: var(--color-accent); }
        .nav-right { display: flex; gap: 8px; align-items: center; }
        .theme-toggle {
            background: none; border: 1px solid var(--color-border); border-radius: 50%;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; transition: background 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }
        .theme-toggle:hover { background: var(--color-surface-glass); }
        .btn-logout {
            background: rgba(255,59,48,0.12); border: 1px solid rgba(255,59,48,0.25);
            color: #ff3b30; padding: 7px 14px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 500; cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-logout:hover { background: rgba(255,59,48,0.22); border-color: rgba(255,59,48,0.4); }

        /* ── PAGE LAYOUT ── */
        .page-wrap {
            position: relative; z-index: 2;
            min-height: 100vh;
            padding: 100px 24px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── GREETING ── */
        .greeting-block {
            margin-bottom: 48px;
            text-align: center;
        }
        .greeting {
            font-size: 2rem; font-weight: 700;
            color: var(--color-text);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .greeting-sub {
            font-size: 1rem;
            color: var(--color-text-muted);
        }

        /* ── DASHBOARD GRID ── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                max-width: 420px;
            }
            .greeting { font-size: 1.6rem; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ── CARD ── */
        .dashboard-card {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 28px 24px;
            background: var(--color-surface-glass);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .dashboard-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        .dashboard-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(0,122,255,0.35);
            background: rgba(0,122,255,0.06);
        }
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .card-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: rgba(0,122,255,0.15);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .card-icon svg {
            width: 22px; height: 22px;
            stroke: var(--color-accent);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .card-arrow {
            color: var(--color-text-muted);
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
        }
        .dashboard-card:hover .card-arrow {
            opacity: 1;
            color: var(--color-accent);
            transform: translateX(3px);
        }
        .card-arrow svg {
            width: 18px; height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .card-body {}
        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 4px;
        }
        .card-desc {
            font-size: 0.82rem;
            color: var(--color-text-muted);
            line-height: 1.45;
        }
    </style>
</head>
<body>

<!-- Beams Background -->
<canvas id="beamsCanvas"></canvas>
<div id="beamsOverlay"></div>

<!-- Nav -->
<nav>
    <div class="nav-container">
        <a class="logo" href="#">Orga<span class="logo-dot">Shift</span></a>
        <ul class="nav-links">
            <li><a href="kontakt.html">Kontakt</a></li>
        </ul>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle" title="Farbschema wechseln">🌙</button>
            <button class="btn-logout" onclick="logout()">Abmelden</button>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="page-wrap">
    <div class="greeting-block">
        <div class="greeting">Willkommen zurück</div>
        <div class="greeting-sub">Was möchtest du heute tun?</div>
    </div>

    <div class="dashboard-grid">

        <!-- Wochenplan -->
        <a class="dashboard-card" href="wochenplanuser.html">
            <div class="card-top">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="3"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="9" y1="9" x2="9" y2="21"/>

                <div class="card-arrow">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>

            <div class="card-body">
                <div class="card-title">Wochenplan</div>

            </div>
        </a>

        <!-- Monatsplan -->
        <a class="dashboard-card" href="monatsplanuser.html">
            <div class="card-top">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="3"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div class="card-title">Monatsplan</div>
                <div class="card-desc">Dienstplan für den aktuellen Monat einsehen</div>
            </div>
        </a>

        <!-- Mein Urlaub -->
        <a class="dashboard-card" href="urlaubMA.html">
            <div class="card-top">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
                        <line x1="12" y1="12" x2="12" y2="16"/>
                        <line x1="10" y1="14" x2="14" y2="14"/>
                    </svg>
                </div>
                <div class="card-arrow">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div class="card-title">Mein Urlaub</div>
                <div class="card-desc">Urlaub beantragen und Kontingent prüfen</div>
            </div>
        </a>

    </div>
</div>

<script>
    /* ── THEME TOGGLE ── */
    (function() {
        var btn = document.getElementById('themeToggle');
        function applyTheme(t) {
            if (t === 'light') document.body.classList.add('light');
            else document.body.classList.remove('light');
            btn.textContent = t === 'light' ? '☀️' : '🌙';
            try { localStorage.setItem('theme', t); } catch(e) {}
        }
        var saved = null;
        try { saved = localStorage.getItem('theme'); } catch(e) {}
        if (saved === 'light' || saved === 'dark') {
            applyTheme(saved);
        } else {
            applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        }
        btn.addEventListener('click', function() {
            applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
        });
    })();

    /* ── LOGOUT ── */
    function logout() {
        window.location.href = 'index.html';
    }

    /* ── BEAMS BACKGROUND ── */
    (function () {
        const canvas = document.getElementById('beamsCanvas');
        const ctx = canvas.getContext('2d');
        const MINIMUM_BEAMS = 20;
        const intensity = 1.0;
        let beams = [];
        let animId;

        function createBeam(width, height) {
            const angle = -35 + Math.random() * 10;
            return {
                x: Math.random() * width * 1.5 - width * 0.25,
                y: Math.random() * height * 1.5 - height * 0.25,
                width: 30 + Math.random() * 60,
                length: height * 2.5,
                angle,
                speed: 0.6 + Math.random() * 1.2,
                opacity: 0.12 + Math.random() * 0.16,
                hue: 190 + Math.random() * 70,
                pulse: Math.random() * Math.PI * 2,
                pulseSpeed: 0.02 + Math.random() * 0.03,
            };
        }

        function updateCanvasSize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(dpr, dpr);
            const total = Math.floor(MINIMUM_BEAMS * 1.5);
            beams = Array.from({ length: total }, () => createBeam(window.innerWidth, window.innerHeight));
        }

        function resetBeam(beam, index, total) {
            const col = index % 3;
            const spacing = window.innerWidth / 3;
            beam.y = window.innerHeight + 100;
            beam.x = col * spacing + spacing / 2 + (Math.random() - 0.5) * spacing * 0.5;
            beam.width = 100 + Math.random() * 100;
            beam.speed = 0.5 + Math.random() * 0.4;
            beam.hue = 190 + (index * 70) / total;
            beam.opacity = 0.2 + Math.random() * 0.1;
        }

        function drawBeam(beam) {
            ctx.save();
            ctx.translate(beam.x, beam.y);
            ctx.rotate(beam.angle * Math.PI / 180);
            const pulsingOpacity = beam.opacity * (0.8 + Math.sin(beam.pulse) * 0.2) * intensity;
            const gradient = ctx.createLinearGradient(0, 0, 0, beam.length);
            gradient.addColorStop(0,   `hsla(${beam.hue}, 85%, 65%, 0)`);
            gradient.addColorStop(0.1, `hsla(${beam.hue}, 85%, 65%, ${pulsingOpacity * 0.5})`);
            gradient.addColorStop(0.4, `hsla(${beam.hue}, 85%, 65%, ${pulsingOpacity})`);
            gradient.addColorStop(0.6, `hsla(${beam.hue}, 85%, 65%, ${pulsingOpacity})`);
            gradient.addColorStop(0.9, `hsla(${beam.hue}, 85%, 65%, ${pulsingOpacity * 0.5})`);
            gradient.addColorStop(1,   `hsla(${beam.hue}, 85%, 65%, 0)`);
            ctx.fillStyle = gradient;
            ctx.fillRect(-beam.width / 2, 0, beam.width, beam.length);
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.filter = 'blur(35px)';
            const total = beams.length;
            beams.forEach((beam, i) => {
                beam.y -= beam.speed;
                beam.pulse += beam.pulseSpeed;
                if (beam.y + beam.length < -100) resetBeam(beam, i, total);
                drawBeam(beam);
            });
            animId = requestAnimationFrame(animate);
        }

        updateCanvasSize();
        window.addEventListener('resize', updateCanvasSize);
        animate();

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) cancelAnimationFrame(animId);
            else animate();
        });
    }());
</script>
</body>
