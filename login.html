<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden – OrgaShift</title>
    <style>
        :root {
            --color-accent: #007AFF;
            --color-text: #f0f0f5;
            --color-text-muted: #8e8e99;
            --color-surface: rgba(18,18,28,0.92);
            --color-surface-glass: rgba(255,255,255,0.07);
            --color-border: rgba(255,255,255,0.1);
            --radius: 16px;
            --shadow: 0 8px 40px rgba(0,0,0,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: var(--color-text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ── BEAMS BACKGROUND ── */
        #beamsCanvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            filter: blur(15px);
            z-index: 0;
            pointer-events: none;
        }
        #beamsOverlay {
            position: fixed; inset: 0;
            z-index: 1;
            pointer-events: none;
            backdrop-filter: blur(50px);
            animation: overlayPulse 10s ease-in-out infinite;
        }
        @keyframes overlayPulse {
            0%,100% { background: rgba(10,10,15,0.05); }
            50%      { background: rgba(10,10,15,0.15); }
        }

        /* ── BACK LINK ── */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 14px;
            border-radius: 25px;
            background: var(--color-surface-glass);
            border: 1px solid var(--color-border);
            backdrop-filter: blur(20px);
            transition: all 0.2s;
        }
        .back-link:hover {
            color: var(--color-text);
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        /* ── CARD ── */
        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            background: var(--color-surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 36px;
            animation: cardIn 0.4s ease;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            color: var(--color-text-muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        /* ── MESSAGES ── */
        .message {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
        }
        .message.error {
            background: rgba(255, 59, 48, 0.12);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff6b6b;
        }
        .message.success {
            background: rgba(52, 199, 89, 0.12);
            border: 1px solid rgba(52, 199, 89, 0.3);
            color: #4cd964;
        }

        /* ── GOOGLE BTN ── */
        .google-btn {
            width: 100%;
            padding: 13px 16px;
            background: var(--color-surface-glass);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            color: var(--color-text);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .google-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }
        .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 0 24px;
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            margin-bottom: 7px;
            color: var(--color-text-muted);
            font-size: 0.82rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            font-size: 0.95rem;
            color: var(--color-text);
            transition: all 0.2s;
        }
        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(255,255,255,0.25);
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--color-accent);
            background: rgba(0,122,255,0.07);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
        }
        input[type="email"].valid   { border-color: rgba(52,199,89,0.6); }
        input[type="email"].invalid { border-color: rgba(255,59,48,0.6); }

        /* ── REMEMBER & FORGOT ── */
        .form-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0 24px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .remember-me input[type="checkbox"] {
            accent-color: var(--color-accent);
            width: 15px; height: 15px;
        }
        .remember-me span {
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }
        .forgot-link {
            color: var(--color-accent);
            font-size: 0.85rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .forgot-link:hover { opacity: 0.75; }

        /* ── LOGIN BUTTON ── */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--color-accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover {
            background: #0056CC;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled {
            background: rgba(0,122,255,0.35);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── REGISTER LINK ── */
        .register-link {
            text-align: center;
            margin-top: 24px;
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }
        .register-link a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover { opacity: 0.75; }

        /* ── LOADING SPINNER ── */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-card { padding: 30px 24px; }
        }
    </style>
</head>
<body>
    <canvas id="beamsCanvas"></canvas>
    <div id="beamsOverlay"></div>

    <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 4l-8 8 8 8"/>
        </svg>
        Zurück
    </a>

    <div class="login-card">
        <div class="logo">
            <span class="logo-text">OrgaShift</span>
        </div>
        <div class="subtitle">Willkommen zurück</div>

        <div class="message error" id="errorMessage"></div>
        <div class="message success" id="successMessage"></div>

        <button type="button" class="google-btn" onclick="signInWithGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Mit Google anmelden
        </button>

        <div class="divider">oder</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email" placeholder="name@beispiel.de" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="form-footer">
                <label class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <span>Angemeldet bleiben</span>
                </label>
                <a href="#" class="forgot-link" onclick="forgotPassword(); return false;">Passwort vergessen?</a>
            </div>

            <button type="submit" class="login-btn" id="loginButton">
                Anmelden
            </button>
        </form>

        <div class="register-link">
            Noch kein Konto? <a href="register.html">Jetzt registrieren</a>
        </div>
    </div>

    <script>
        /* ── BEAMS ── */
        (function() {
            const canvas = document.getElementById('beamsCanvas');
            const ctx = canvas.getContext('2d');
            let beams = [];
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            function createBeam() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.15 + Math.random() * 0.3,
                    length: 200 + Math.random() * 400,
                    width: 1 + Math.random() * 2,
                    hue: Math.random() < 0.6 ? 210 : (Math.random() < 0.5 ? 270 : 190),
                    alpha: 0.08 + Math.random() * 0.18,
                    life: 0,
                    maxLife: 200 + Math.random() * 300
                };
            }
            function init() {
                beams = Array.from({length: 12}, createBeam);
            }
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                beams.forEach((b, i) => {
                    b.life++;
                    if (b.life > b.maxLife) beams[i] = createBeam();
                    const fade = Math.sin((b.life / b.maxLife) * Math.PI);
                    const ex = b.x + Math.cos(b.angle) * b.length;
                    const ey = b.y + Math.sin(b.angle) * b.length;
                    const grad = ctx.createLinearGradient(b.x, b.y, ex, ey);
                    grad.addColorStop(0, `hsla(${b.hue},80%,60%,0)`);
                    grad.addColorStop(0.4, `hsla(${b.hue},80%,60%,${b.alpha * fade})`);
                    grad.addColorStop(1, `hsla(${b.hue},80%,60%,0)`);
                    ctx.beginPath();
                    ctx.moveTo(b.x, b.y);
                    ctx.lineTo(ex, ey);
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = b.width;
                    ctx.stroke();
                    b.x += Math.cos(b.angle + Math.PI / 2) * b.speed;
                    b.y += Math.sin(b.angle + Math.PI / 2) * b.speed;
                });
                requestAnimationFrame(draw);
            }
            resize();
            init();
            draw();
            window.addEventListener('resize', () => { resize(); init(); });
        })();

        /* ── UI ── */
        function showMessage(msg, type) {
            const el = document.getElementById(type === 'error' ? 'errorMessage' : 'successMessage');
            const other = document.getElementById(type === 'error' ? 'successMessage' : 'errorMessage');
            other.style.display = 'none';
            el.textContent = msg;
            el.style.display = 'block';
            clearTimeout(el._t);
            el._t = setTimeout(() => el.style.display = 'none', 5000);
        }

        function signInWithGoogle() {
            showMessage('Google-Anmeldung wird hier implementiert.', 'success');
        }

        function forgotPassword() {
            const email = document.getElementById('email').value;
            if (email) {
                showMessage(`Passwort-Reset-Link wurde an ${email} gesendet.`, 'success');
            } else {
                showMessage('Bitte zuerst E-Mail-Adresse eingeben.', 'error');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginButton');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Anmelden...';

            setTimeout(() => {
                if (email === 'demo@make.com' && password === 'password123') {
                    showMessage('Anmeldung erfolgreich! Willkommen zurück.', 'success');
                    setTimeout(() => alert('Weiterleitung zum Dashboard.'), 1500);
                } else {
                    showMessage('Ungültige Anmeldedaten. Demo: demo@make.com / password123', 'error');
                }
                btn.disabled = false;
                btn.innerHTML = 'Anmelden';
            }, 1400);
        });

        document.getElementById('email').addEventListener('input', function() {
            const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value);
            this.className = this.value.length > 0 ? (ok ? 'valid' : 'invalid') : '';
        });

        setTimeout(() => showMessage('Demo: demo@make.com / password123', 'success'), 800);
    </script>
</body>
</html>
