<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden – OrgaShift</title>
    <style>
        :root {
            --color-accent: #007AFF;
            --color-text: #f0f0f5;
            --color-text-muted: #8e8e99;
            --color-surface: rgba(18,18,28,0.85);
            --color-surface-glass: rgba(255,255,255,0.07);
            --color-border: rgba(255,255,255,0.1);
            --color-bg: #0a0a0f;
            --radius: 16px;
        }

        /* ── LIGHT MODE ── */
        body.light {
            --color-text: #1a1a2e;
            --color-text-muted: #5a6376;
            --color-surface: rgba(255,255,255,0.88);
            --color-surface-glass: rgba(0,0,0,0.04);
            --color-border: rgba(0,0,0,0.1);
            --color-bg: #e8edf5;
        }
        body.light { background: var(--color-bg); }
        body.light .login-card {
            box-shadow: 0 24px 64px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06) inset;
        }
        body.light .logo h1 { color: #1a1a2e; }
        body.light .google-btn:hover {
            background: rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.18);
        }
        body.light .form-group input {
            background: rgba(0,0,0,0.04);
            color: var(--color-text);
        }
        body.light .form-group input::placeholder { color: rgba(0,0,0,0.25); }
        body.light .form-group input:focus { background: rgba(0,122,255,0.05); }
        body.light #beamsOverlay { animation: overlayPulseLight 10s ease-in-out infinite; }
        @keyframes overlayPulseLight {
            0%, 100% { background: rgba(232,237,245,0.2); }
            50%       { background: rgba(232,237,245,0.4); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--color-bg, #0a0a0f);
            transition: background 0.3s ease;
            min-height: 100vh;
            color: var(--color-text);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── BEAMS BACKGROUND ── */
        #beamsCanvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            filter: blur(15px);
            z-index: 0;
            pointer-events: none;
        }
        #beamsOverlay {
            position: fixed; inset: 0;
            z-index: 1;
            pointer-events: none;
            backdrop-filter: blur(50px);
            animation: overlayPulse 10s ease-in-out infinite;
        }
        @keyframes overlayPulse {
            0%, 100% { background: rgba(10,10,15,0.05); }
            50%       { background: rgba(10,10,15,0.15); }
        }

        /* ── LOGIN WRAPPER ── */
        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--color-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── BACK LINK ── */
        .back-link {
            position: absolute;
            top: 32px;
            left: 32px;
            display: flex;
            align-items: center;
            color: var(--color-accent);
            text-decoration: none;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
            background: rgba(0, 122, 255, 0.1);
        }
        .back-link:hover {
            background: rgba(0, 122, 255, 0.2);
            transform: scale(1.1);
        }

        /* ── LOGO ── */
        .logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .logo-dot {
            color: var(--color-accent);
        }

        .subtitle {
            text-align: center;
            color: var(--color-text-muted);
            font-size: 14px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* ── MESSAGES ── */
        .message {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.45;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message.error {
            background: rgba(255, 59, 48, 0.12);
            border: 1px solid rgba(255, 59, 48, 0.25);
            color: #ff6b6b;
        }
        .message.success {
            background: rgba(52, 199, 89, 0.12);
            border: 1px solid rgba(52, 199, 89, 0.25);
            color: #5ac87a;
        }

        /* ── GOOGLE BUTTON ── */
        .google-btn {
            width: 100%;
            padding: 13px 16px;
            background: var(--color-surface-glass);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            color: var(--color-text);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }
        .google-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }
        .google-btn:active { transform: translateY(0); }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 0 20px;
            color: var(--color-text-muted);
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        /* ── FORM ── */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--color-text-muted);
            font-size: 13px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 13px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            color: var(--color-text);
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        .form-group input:focus {
            border-color: var(--color-accent);
            background: rgba(0,122,255,0.06);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
        }
        .form-group input.valid   { border-color: #34C759; }
        .form-group input.invalid { border-color: #FF3B30; }

        /* ── REMEMBER ME ── */
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 16px 0;
        }
        .remember-row input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--color-accent);
            cursor: pointer;
        }
        .remember-row label {
            font-size: 13px;
            color: var(--color-text-muted);
            cursor: pointer;
        }

        /* ── LOGIN BUTTON ── */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--color-accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }
        .login-btn:hover {
            background: #0056CC;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
        }
        .login-btn:active  { transform: translateY(0); }
        .login-btn:disabled {
            background: rgba(255,255,255,0.15);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            color: rgba(255,255,255,0.4);
        }

        /* ── LOADING SPINNER ── */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── FOOTER LINKS ── */
        .forgot-password {
            text-align: center;
            margin-top: 18px;
        }
        .forgot-password a {
            color: var(--color-accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .forgot-password a:hover { opacity: 0.75; }

        .register-link {
            text-align: center;
            margin-top: 14px;
            color: var(--color-text-muted);
            font-size: 13px;
        }
        .register-link a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .register-link a:hover { opacity: 0.75; }

        /* ── THEME TOGGLE ── */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid var(--color-border);
            background: var(--color-surface-glass);
            backdrop-filter: blur(12px);
            color: var(--color-text);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .theme-toggle:hover {
            background: rgba(0,122,255,0.12);
            border-color: var(--color-accent);
            color: var(--color-accent);
            transform: scale(1.1);
        }
        .theme-toggle .icon-sun  { display: none; }
        .theme-toggle .icon-moon { display: block; }
        body.light .theme-toggle .icon-sun  { display: block; }
        body.light .theme-toggle .icon-moon { display: none; }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            body { align-items: flex-start; overflow-y: auto; }
            .login-wrapper { padding: 16px; margin: auto; }
            .login-card { padding: 32px 24px; }
            .back-link { top: 24px; left: 24px; }
        }
    </style>
</head>
<body>
    <canvas id="beamsCanvas" aria-hidden="true"></canvas>
    <div id="beamsOverlay" aria-hidden="true"></div>

    <button class="theme-toggle" id="themeToggle" aria-label="Design wechseln">
        <!-- Moon (dark mode) -->
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun (light mode) -->
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
    </button>

    <main class="login-wrapper">
        <a href="index.html" class="back-link" aria-label="Zurück zur Startseite">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 4l-8 8 8 8"/>
            </svg>
        </a>

        <div class="login-card">
            <div class="logo">
                <h1>Orga<span class="logo-dot">Shift</span></h1>
            </div>
            <p class="subtitle">Willkommen zurück – melden Sie sich an</p>

            <div class="message error" id="errorMessage"></div>
            <div class="message success" id="successMessage"></div>

            <form id="loginForm" novalidate>
                <button type="button" class="google-btn" onclick="signInWithGoogle()">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Mit Google anmelden
                </button>

                <div class="divider"><span>oder</span></div>

                <div class="form-group">
                    <label for="email">E-Mail-Adresse</label>
                    <input type="email" id="email" name="email"
                           placeholder="name@unternehmen.de"
                           autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password"
                           placeholder="••••••••"
                           autocomplete="current-password" required>
                </div>

                <div class="remember-row">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Angemeldet bleiben</label>
                </div>

                <button type="submit" class="login-btn" id="loginButton">
                    Anmelden
                </button>
            </form>

            <div class="forgot-password">
                <a href="#" onclick="forgotPassword(); return false;">Passwort vergessen?</a>
            </div>

            <div class="register-link">
                Noch kein Konto? <a href="register.html">Jetzt registrieren</a>
            </div>
        </div>
    </main>

    <script>
    // ─────────────────────────────────────────────
    //  BEAMS BACKGROUND  (vanilla JS)
    // ─────────────────────────────────────────────
    (function () {
        const canvas = document.getElementById('beamsCanvas');
        const ctx = canvas.getContext('2d');
        let beams = [];
        let raf;
        const BEAM_COUNT = 20;
        const INTENSITY = 1.0;

        function createBeam(w, h) {
            const angle = -35 + Math.random() * 10;
            return {
                x: Math.random() * w * 1.5 - w * 0.25,
                y: Math.random() * h * 1.5 - h * 0.25,
                width: 30 + Math.random() * 60,
                length: h * 2.5,
                angle: angle,
                speed: 0.6 + Math.random() * 1.2,
                opacity: 0.12 + Math.random() * 0.16,
                hue: 190 + Math.random() * 70,
                pulse: Math.random() * Math.PI * 2,
                pulseSpeed: 0.02 + Math.random() * 0.03
            };
        }

        function resetBeam(beam, index, total) {
            const spacing = canvas.width / 3;
            const column = index % 3;
            beam.y       = canvas.height + 100;
            beam.x       = column * spacing + spacing / 2 + (Math.random() - 0.5) * spacing * 0.5;
            beam.width   = 100 + Math.random() * 100;
            beam.speed   = 0.5 + Math.random() * 0.4;
            beam.hue     = 190 + (index * 70) / total;
            beam.opacity = 0.2 + Math.random() * 0.1;
        }

        function drawBeam(beam) {
            ctx.save();
            ctx.translate(beam.x, beam.y);
            ctx.rotate(beam.angle * Math.PI / 180);
            const pulsingOpacity = beam.opacity * (0.8 + Math.sin(beam.pulse) * 0.2) * INTENSITY;
            const g = ctx.createLinearGradient(0, 0, 0, beam.length);
            g.addColorStop(0,   `hsla(${beam.hue},85%,65%,0)`);
            g.addColorStop(0.1, `hsla(${beam.hue},85%,65%,${pulsingOpacity * 0.5})`);
            g.addColorStop(0.4, `hsla(${beam.hue},85%,65%,${pulsingOpacity})`);
            g.addColorStop(0.6, `hsla(${beam.hue},85%,65%,${pulsingOpacity})`);
            g.addColorStop(0.9, `hsla(${beam.hue},85%,65%,${pulsingOpacity * 0.5})`);
            g.addColorStop(1,   `hsla(${beam.hue},85%,65%,0)`);
            ctx.fillStyle = g;
            ctx.fillRect(-beam.width / 2, 0, beam.width, beam.length);
            ctx.restore();
        }

        function updateCanvasSize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width  = window.innerWidth  * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width  = window.innerWidth  + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(dpr, dpr);
            beams = Array.from({ length: BEAM_COUNT }, () =>
                createBeam(window.innerWidth, window.innerHeight)
            );
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.filter = 'blur(35px)';
            beams.forEach((beam, i) => {
                beam.y     -= beam.speed;
                beam.pulse += beam.pulseSpeed;
                if (beam.y + beam.length < -100) resetBeam(beam, i, beams.length);
                drawBeam(beam);
            });
            raf = requestAnimationFrame(animate);
        }

        updateCanvasSize();
        window.addEventListener('resize', updateCanvasSize);
        animate();
    })();

    // ─────────────────────────────────────────────
    //  LOGIN LOGIC
    // ─────────────────────────────────────────────
    function showMessage(text, type) {
        const errorDiv   = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        errorDiv.style.display   = 'none';
        successDiv.style.display = 'none';

        const target = type === 'error' ? errorDiv : successDiv;
        target.textContent    = text;
        target.style.display  = 'block';

        clearTimeout(target._timer);
        target._timer = setTimeout(() => { target.style.display = 'none'; }, 5000);
    }

    function signInWithGoogle() {
        showMessage('Google-Anmeldung würde hier implementiert werden.', 'success');
    }

    function forgotPassword() {
        const email = document.getElementById('email').value.trim();
        if (email) {
            showMessage(`Passwort-Reset-Link wurde an ${email} gesendet.`, 'success');
        } else {
            showMessage('Bitte geben Sie zuerst Ihre E-Mail-Adresse ein.', 'error');
        }
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('loginButton');

        if (!email) { showMessage('Bitte geben Sie Ihre E-Mail-Adresse ein.', 'error'); return; }
        if (!password) { showMessage('Bitte geben Sie Ihr Passwort ein.', 'error'); return; }

        btn.disabled  = true;
        btn.innerHTML = '<span class="spinner"></span> Anmelden...';

        setTimeout(() => {
            if (email === 'demo@make.com' && password === 'password123') {
                showMessage('Anmeldung erfolgreich! Willkommen zurück.', 'success');
                setTimeout(() => { window.location.href = 'welcome.html'; }, 1500);
            } else {
                showMessage('Ungültige E-Mail-Adresse oder Passwort. Demo: demo@make.com / password123', 'error');
                btn.disabled  = false;
                btn.innerHTML = 'Anmelden';
            }
        }, 1200);
    });

    // Live email validation
    document.getElementById('email').addEventListener('input', function () {
        const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value);
        this.classList.toggle('valid',   this.value.length > 0 && ok);
        this.classList.toggle('invalid', this.value.length > 0 && !ok);
    });

    // Demo hint on load
    window.addEventListener('load', function () {
        setTimeout(() => {
            showMessage('Demo: demo@make.com / password123', 'success');
        }, 800);
    });

    // ─────────────────────────────────────────────
    //  THEME TOGGLE
    // ─────────────────────────────────────────────
    (function () {
        const btn  = document.getElementById('themeToggle');
        const body = document.body;
        const saved = localStorage.getItem('orgashift_theme');
        if (saved === 'light') body.classList.add('light');

        btn.addEventListener('click', function () {
            body.classList.toggle('light');
            localStorage.setItem('orgashift_theme',
                body.classList.contains('light') ? 'light' : 'dark');
        });
    })();
    </script>
</body>
</html>
