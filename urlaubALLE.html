<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrgaShift 2 – Jahresplaner</title>
    <style>
        /* ── DESIGN TOKENS ── */
        :root {
            --color-accent: #007AFF;
            --color-text: #f0f0f5;
            --color-text-muted: #8e8e99;
            --color-surface: rgba(18,18,28,0.92);
            --color-surface-glass: rgba(255,255,255,0.07);
            --color-border: rgba(255,255,255,0.1);
            --color-bg: #0a0a0f;
            --color-nav-bg: rgba(8,8,16,0.88);
            --color-nav-border: rgba(255,255,255,0.08);
            --color-danger: #FF3B30;
            --color-success: #34C759;
            --color-warn: #FF9500;
            --radius: 14px;
            --shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* ── LIGHT MODE ── */
        body.light {
            --color-text: #1a1a2e;
            --color-text-muted: #5a6376;
            --color-surface: rgba(255,255,255,0.92);
            --color-surface-glass: rgba(0,0,0,0.04);
            --color-border: rgba(0,0,0,0.1);
            --color-bg: #e8edf5;
            --color-nav-bg: rgba(255,255,255,0.88);
            --color-nav-border: rgba(0,0,0,0.1);
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        body.light { background: var(--color-bg); }
        body.light .logo { color: var(--color-text); }
        body.light .nav-links a { color: var(--color-text); }
        body.light .page-title { color: #1a1a2e; }
        body.light .year-display { color: #1a1a2e; }
        body.light .page-subtitle { color: rgba(0,0,0,0.6); }
        body.light input[type="text"],
        body.light input[type="date"],
        body.light select { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.15); color: var(--color-text); }
        body.light .planner-table td { color: var(--color-text); border-color: rgba(0,0,0,0.07); }
        body.light .planner-table td:first-child { background: rgba(0,0,0,0.04); color: var(--color-text); }
        body.light .planner-table thead tr:last-child th { background: rgba(0,0,0,0.04); color: var(--color-text-muted); }
        body.light .weekend { background: rgba(0,0,0,0.04) !important; color: var(--color-text-muted) !important; }
        body.light .legend-item { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
        body.light .stat-card { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }
        body.light .stat-card h4 { color: var(--color-text); }
        body.light .btn-secondary { background: rgba(0,0,0,0.07); color: var(--color-text); }
        body.light #beamsOverlay { animation: overlayPulseLight 10s ease-in-out infinite; }
        @keyframes overlayPulseLight {
            0%, 100% { background: rgba(232,237,245,0.2); }
            50%       { background: rgba(232,237,245,0.4); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--color-bg, #0a0a0f);
            transition: background 0.3s ease;
            min-height: 100vh;
            color: var(--color-text);
            overflow-x: hidden;
        }

        /* ── BEAMS BACKGROUND ── */
        #beamsCanvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            filter: blur(15px);
            z-index: 0;
            pointer-events: none;
        }
        #beamsOverlay {
            position: fixed; inset: 0;
            z-index: 1;
            pointer-events: none;
            backdrop-filter: blur(50px);
            animation: overlayPulse 10s ease-in-out infinite;
        }
        @keyframes overlayPulse {
            0%, 100% { background: rgba(10,10,15,0.05); }
            50%       { background: rgba(10,10,15,0.15); }
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; width: 100%;
            background: var(--color-nav-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--color-nav-border);
            z-index: 1000;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center; height: 60px;
        }
        .logo {
            font-size: 22px; font-weight: 700; color: var(--color-text); text-decoration: none;
            letter-spacing: -0.02em;
        }
        .logo-dot { color: var(--color-accent); }
        .nav-links { display: flex; list-style: none; gap: 24px; }
        .nav-links a {
            text-decoration: none; color: var(--color-text);
            font-size: 0.9rem; opacity: 0.7; transition: opacity 0.2s, color 0.2s;
        }
        .nav-links a:hover { opacity: 1; color: var(--color-accent); }
        .nav-right { display: flex; gap: 8px; align-items: center; }
        .theme-toggle {
            background: var(--color-surface-glass);
            border: 1px solid var(--color-border);
            color: var(--color-text); font-size: 16px;
            width: 36px; height: 36px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.12); }

        /* ── PAGE WRAP ── */
        .page-wrap { position: relative; z-index: 2; padding-top: 72px; }
        .page { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }

        /* ── HEADER ── */
        .page-header { padding-top: 8px; margin-bottom: 24px; text-align: center; }
        .page-title { font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 12px; }
        .year-nav {
            display: flex; align-items: center; justify-content: center;
            gap: 16px; margin-bottom: 8px;
        }
        .year-btn {
            background: var(--color-accent); color: #fff; border: none;
            width: 36px; height: 36px; border-radius: 8px;
            cursor: pointer; font-size: 1rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-family: inherit;
        }
        .year-btn:hover { background: #0056CC; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,122,255,0.4); }
        .year-display { font-size: 1.8rem; font-weight: 700; color: #fff; min-width: 80px; text-align: center; }
        .page-subtitle { color: rgba(255,255,255,0.65); font-size: 0.95rem; }

        /* ── CONTROLS ── */
        .controls {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end;
        }
        .control-group {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
        }
        .control-group label {
            font-size: 0.82rem; font-weight: 500; color: var(--color-text-muted); white-space: nowrap;
        }
        input[type="text"], input[type="date"], select {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--color-border);
            border-radius: 8px; color: var(--color-text);
            padding: 8px 10px; font-size: 0.88rem; font-family: inherit; outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            border-color: var(--color-accent);
            background: rgba(0,122,255,0.06);
        }
        input::placeholder { color: rgba(255,255,255,0.2); }
        select option { background: #1a1a2e; color: var(--color-text); }
        body.light select option { background: #fff; color: #1a1a2e; }

        /* ── BUTTONS ── */
        .btn {
            padding: 8px 14px; border-radius: 8px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; border: 1px solid var(--color-border);
            font-family: inherit; transition: all 0.2s; display: inline-flex;
            align-items: center; gap: 5px; white-space: nowrap;
        }
        .btn-primary {
            background: var(--color-accent); color: #fff; border-color: var(--color-accent);
        }
        .btn-primary:hover { background: #0056CC; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,122,255,0.4); }
        .btn-secondary {
            background: var(--color-surface-glass); color: var(--color-text);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }
        .btn-success {
            background: rgba(52,199,89,0.15); color: var(--color-success); border-color: rgba(52,199,89,0.3);
        }
        .btn-success:hover { background: rgba(52,199,89,0.25); }
        .btn-danger {
            background: rgba(255,59,48,0.12); color: var(--color-danger); border-color: rgba(255,59,48,0.25);
        }
        .btn-danger:hover { background: rgba(255,59,48,0.22); }

        /* ── TABLE CONTAINER ── */
        .table-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .table-container { overflow-x: auto; }

        .planner-table {
            width: max-content; min-width: 100%;
            border-collapse: collapse;
            font-size: 0.82em;
        }
        .planner-table thead tr:first-child th {
            padding: 8px 4px; text-align: center;
            font-weight: 600; font-size: 0.75rem;
            position: sticky; top: 0; z-index: 10;
            min-width: 24px; color: #fff; opacity: 0.9;
        }
        .planner-table thead tr:first-child th:first-child {
            background: rgba(255,255,255,0.06) !important;
            position: sticky; left: 0; z-index: 20;
            min-width: 130px; text-align: left; padding: 8px 14px;
            color: var(--color-text-muted); opacity: 1;
        }
        .planner-table thead tr:last-child th {
            background: rgba(255,255,255,0.04);
            padding: 6px 3px; text-align: center;
            font-size: 0.7rem; color: var(--color-text-muted);
            border-bottom: 1px solid var(--color-border);
            font-weight: 500;
        }
        .planner-table thead tr:last-child th:first-child {
            position: sticky; left: 0; z-index: 15;
            background: rgba(255,255,255,0.06);
        }
        .planner-table td {
            padding: 3px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--color-text); font-size: 0.78em;
            transition: background 0.15s;
            cursor: pointer; min-width: 24px; height: 32px;
        }
        .planner-table td:first-child {
            background: rgba(255,255,255,0.04);
            font-weight: 600; color: var(--color-text);
            text-align: left; padding: 6px 14px;
            position: sticky; left: 0; z-index: 5;
            min-width: 130px; cursor: default;
            border-right: 1px solid var(--color-border);
        }
        .planner-table td:hover:not(:first-child) { background: rgba(0,122,255,0.12); }
        .vacation { background: rgba(78,205,196,0.25) !important; color: #4ecdc4 !important; font-weight: 700; }
        .sick     { background: rgba(255,107,107,0.25) !important; color: #ff6b6b !important; font-weight: 700; }
        .weekend  { background: rgba(255,255,255,0.03) !important; color: rgba(255,255,255,0.2) !important; cursor: default !important; }

        /* Monatsspalten-Header Farben */
        .month-0  { background: rgba(231,76,60,0.75) !important; }
        .month-1  { background: rgba(230,126,34,0.75) !important; }
        .month-2  { background: rgba(243,156,18,0.75) !important; }
        .month-3  { background: rgba(46,204,113,0.75) !important; }
        .month-4  { background: rgba(26,188,156,0.75) !important; }
        .month-5  { background: rgba(52,152,219,0.75) !important; }
        .month-6  { background: rgba(155,89,182,0.75) !important; }
        .month-7  { background: rgba(233,30,99,0.75) !important; }
        .month-8  { background: rgba(255,87,34,0.75) !important; }
        .month-9  { background: rgba(121,85,72,0.75) !important; }
        .month-10 { background: rgba(96,125,139,0.75) !important; }
        .month-11 { background: rgba(44,62,80,0.9) !important; }

        /* ── LEGEND ── */
        .legend {
            display: flex; justify-content: center; gap: 12px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .legend-item {
            display: flex; align-items: center; gap: 8px;
            background: var(--color-surface-glass);
            border: 1px solid var(--color-border);
            padding: 6px 14px; border-radius: 10px;
            backdrop-filter: blur(12px);
            font-size: 0.85rem; color: var(--color-text);
        }
        .legend-color { width: 22px; height: 16px; border-radius: 4px; }
        .legend-color.vacation { background: rgba(78,205,196,0.6); }
        .legend-color.sick { background: rgba(255,107,107,0.6); }
        .legend-color.weekend { background: rgba(255,255,255,0.08); border: 1px solid var(--color-border); }

        /* ── STATS ── */
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px; margin-top: 20px;
        }
        .stat-card {
            background: var(--color-surface-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-border);
            border-radius: var(--radius); padding: 16px; text-align: center;
        }
        .stat-card h4 { font-size: 0.9rem; font-weight: 600; color: var(--color-text); margin-bottom: 8px; }
        .stat-card div { font-size: 0.85rem; color: var(--color-text-muted); margin-top: 3px; }
        .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--color-accent); }

        /* ── SAVE STATUS TOAST ── */
        #saveStatus {
            position: fixed; top: 72px; right: 20px;
            background: rgba(52,199,89,0.95); color: #fff;
            padding: 10px 16px; border-radius: 10px;
            font-size: 0.88rem; font-weight: 500;
            opacity: 0; transition: opacity 0.3s ease;
            z-index: 2000; backdrop-filter: blur(10px);
        }
        #saveStatus.show { opacity: 1; }

        /* ── NO EMPLOYEES ── */
        .no-employees {
            text-align: center; color: var(--color-text-muted);
            font-style: italic; padding: 50px;
            font-size: 0.9rem;
        }

        /* ── FILE INPUT ── */
        .file-input { display: none; }

        /* ── RESPONSIVE ── */
        @media(max-width: 900px) {
            .nav-links { display: none; }
            .page-title { font-size: 1.5rem; }
            .controls { flex-direction: column; align-items: stretch; }
            .control-group { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<!-- BEAMS BACKGROUND -->
<canvas id="beamsCanvas" aria-hidden="true"></canvas>
<div id="beamsOverlay" aria-hidden="true"></div>

<nav>
    <div class="nav-container">
        <a href="dashboardadmin.html" class="logo">Orga<span class="logo-dot">Shift</span></a>
        <ul class="nav-links">

<script>
    // ─────────────────────────────────────────
    //  BEAMS BACKGROUND
    // ─────────────────────────────────────────
    (function () {
        const canvas = document.getElementById('beamsCanvas');
        const ctx = canvas.getContext('2d');
        let beams = [];
        const BEAM_COUNT = 20;
        const INTENSITY = 1.0;
        function createBeam(w, h) {
            const angle = -35 + Math.random() * 10;
            return { x: Math.random() * w * 1.5 - w * 0.25, y: Math.random() * h * 1.5 - h * 0.25, width: 30 + Math.random() * 60, length: h * 2.5, angle, speed: 0.6 + Math.random() * 1.2, opacity: 0.12 + Math.random() * 0.16, hue: 190 + Math.random() * 70, pulse: Math.random() * Math.PI * 2, pulseSpeed: 0.02 + Math.random() * 0.03 };
        }
        function resetBeam(beam, index, total) {
            const spacing = canvas.width / 3, column = index % 3;
            beam.y = canvas.height + 100; beam.x = column * spacing + spacing / 2 + (Math.random() - 0.5) * spacing * 0.5;
            beam.width = 100 + Math.random() * 100; beam.speed = 0.5 + Math.random() * 0.4;
            beam.hue = 190 + (index * 70) / total; beam.opacity = 0.2 + Math.random() * 0.1;
        }
        function drawBeam(beam) {
            ctx.save(); ctx.translate(beam.x, beam.y); ctx.rotate(beam.angle * Math.PI / 180);
            const p = beam.opacity * (0.8 + Math.sin(beam.pulse) * 0.2) * INTENSITY;
            const g = ctx.createLinearGradient(0, 0, 0, beam.length);
            g.addColorStop(0, `hsla(${beam.hue},85%,65%,0)`); g.addColorStop(0.1, `hsla(${beam.hue},85%,65%,${p * 0.5})`);
            g.addColorStop(0.4, `hsla(${beam.hue},85%,65%,${p})`); g.addColorStop(0.6, `hsla(${beam.hue},85%,65%,${p})`);
            g.addColorStop(0.9, `hsla(${beam.hue},85%,65%,${p * 0.5})`); g.addColorStop(1, `hsla(${beam.hue},85%,65%,0)`);
            ctx.fillStyle = g; ctx.fillRect(-beam.width / 2, 0, beam.width, beam.length); ctx.restore();
        }
        function updateCanvasSize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px'; canvas.style.height = window.innerHeight + 'px';
            ctx.scale(dpr, dpr);
            beams = Array.from({ length: BEAM_COUNT }, () => createBeam(window.innerWidth, window.innerHeight));
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.filter = 'blur(35px)';
            beams.forEach((beam, i) => { beam.y -= beam.speed; beam.pulse += beam.pulseSpeed; if (beam.y + beam.length < -100) resetBeam(beam, i, beams.length); drawBeam(beam); });
            requestAnimationFrame(animate);
        }
        updateCanvasSize(); window.addEventListener('resize', updateCanvasSize); animate();
    })();

    // ─────────────────────────────────────────
    //  THEME TOGGLE
    // ─────────────────────────────────────────
    (function () {
        const btn = document.getElementById('themeToggleBtn');
        const body = document.body;
        if (localStorage.getItem('orgashift_theme') === 'light') body.classList.add('light');
        btn.textContent = body.classList.contains('light') ? '☀️' : '🌙';
        btn.addEventListener('click', function () {
            body.classList.toggle('light');
            const isLight = body.classList.contains('light');
            localStorage.setItem('orgashift_theme', isLight ? 'light' : 'dark');
            btn.textContent = isLight ? '☀️' : '🌙';
        });
    })();

    // ─────────────────────────────────────────
    //  JAHRESPLANER FUNKTIONALITÄT
    // ─────────────────────────────────────────
    const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    const monthsShort = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

    let currentYear = new Date().getFullYear();
    let employees = [];
    let entries = {};

    function isLeapYear(year) { return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0); }
    function getDaysInMonth(year) { return [31, isLeapYear(year) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]; }

    const EMPLOYEES_KEY = 'jahresplaner_employees';
    function entriesKey(year) { return `jahresplaner_entries_${year}`; }

    function saveData() {
        localStorage.setItem(EMPLOYEES_KEY, JSON.stringify(employees));
        localStorage.setItem(entriesKey(currentYear), JSON.stringify(entries));
        showSaveStatus();
    }

    function loadData() {
        try {
            const oldData = localStorage.getItem('jahresplaner_data');
            if (oldData && !localStorage.getItem(EMPLOYEES_KEY)) {
                const data = JSON.parse(oldData);
                employees = data.employees || [];
                entries = data.entries || {};
                localStorage.setItem(EMPLOYEES_KEY, JSON.stringify(employees));
                localStorage.setItem(entriesKey(currentYear), JSON.stringify(entries));
                localStorage.removeItem('jahresplaner_data');
            } else {
                const savedEmployees = localStorage.getItem(EMPLOYEES_KEY);
                if (savedEmployees) employees = JSON.parse(savedEmployees);
                const savedEntries = localStorage.getItem(entriesKey(currentYear));
                entries = savedEntries ? JSON.parse(savedEntries) : {};
            }
            updateEmployeeSelect();
            generateTable();
        } catch (error) { console.error('Fehler beim Laden der Daten:', error); }
    }

    function changeYear(delta) {
        saveData();
        currentYear += delta;
        document.getElementById('yearDisplay').textContent = currentYear;
        try {
            const savedEntries = localStorage.getItem(entriesKey(currentYear));
            entries = savedEntries ? JSON.parse(savedEntries) : {};
            employees.forEach(emp => { if (!entries[emp]) entries[emp] = []; });
        } catch (e) { entries = {}; }
        generateTable();
    }

    function showSaveStatus() {
        const status = document.getElementById('saveStatus');
        status.classList.add('show');
        setTimeout(() => { status.classList.remove('show'); }, 2000);
    }

    function exportData() {
        const data = { employees, entries, year: currentYear, exportDate: new Date().toISOString(), version: '2.0' };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `jahresplaner_${currentYear}_backup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (confirm('Importierte Daten mit aktuellen zusammenführen oder ersetzen?\n\nOK = Ersetzen\nAbbrechen = Zusammenführen')) {
                    employees = data.employees || []; entries = data.entries || {};
                } else {
                    const importedEmployees = data.employees || [];
                    const importedEntries = data.entries || {};
                    importedEmployees.forEach(emp => { if (!employees.includes(emp)) employees.push(emp); });
                    Object.keys(importedEntries).forEach(emp => {
                        if (!entries[emp]) entries[emp] = [];
                        entries[emp] = [...entries[emp], ...importedEntries[emp]];
                    });
                }
                employees.sort(); updateEmployeeSelect(); generateTable(); saveData();
                alert('Daten wurden erfolgreich importiert!');
            } catch (error) { alert('Fehler beim Importieren der Datei.'); console.error('Import error:', error); }
        };
        reader.readAsText(file); input.value = '';
    }

    function isWeekend(date) { const day = date.getDay(); return day === 0 || day === 6; }

    function addEmployee() {
        const name = document.getElementById('employeeName').value.trim();
        if (!name) { alert('Bitte geben Sie einen Namen ein.'); return; }
        if (employees.includes(name)) { alert('Dieser Mitarbeiter existiert bereits.'); return; }
        employees.push(name); employees.sort(); entries[name] = [];
        document.getElementById('employeeName').value = '';
        updateEmployeeSelect(); generateTable(); saveData();
    }

    function updateEmployeeSelect() {
        const select = document.getElementById('employeeSelect');
        select.innerHTML = '<option value="">Mitarbeiter wählen...</option>';
        [...employees].sort().forEach(emp => {
            const option = document.createElement('option');
            option.value = emp; option.textContent = emp; select.appendChild(option);
        });
    }

    function addEntry() {
        const employee = document.getElementById('employeeSelect').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const type = document.getElementById('entryType').value;
        if (!employee || !startDate || !endDate) { alert('Bitte füllen Sie alle Felder aus.'); return; }
        if (new Date(startDate) > new Date(endDate)) { alert('Das Startdatum muss vor dem Enddatum liegen.'); return; }
        if (!entries[employee]) entries[employee] = [];
        if (type === 'clear') {
            const start = new Date(startDate), end = new Date(endDate);
            entries[employee] = entries[employee].filter(entry => !(new Date(entry.start) <= end && new Date(entry.end) >= start));
        } else {
            entries[employee].push({ start: startDate, end: endDate, type });
        }
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        generateTable(); saveData();
    }

    function isDateInRange(date, start, end) {
        const checkDate = new Date(date);
        return checkDate >= new Date(start) && checkDate <= new Date(end);
    }

    function getEntryForDate(employee, dateStr) {
        if (!entries[employee]) return null;
        for (let entry of entries[employee]) {
            if (isDateInRange(dateStr, entry.start, entry.end)) return entry.type;
        }
        return null;
    }

    function generateTable() {
        const table = document.getElementById('plannerTable');
        const daysInMonth = getDaysInMonth(currentYear);

        if (employees.length === 0) {
            table.innerHTML = `<tr><td class="no-employees" colspan="100%">Noch keine Mitarbeiter hinzugefügt.</td></tr>`;
            updateStats(); return;
        }

        let html = '<thead><tr><th></th>';
        for (let month = 0; month < 12; month++) {
            html += `<th class="month-${month}" colspan="${daysInMonth[month]}">${monthsShort[month]}</th>`;
        }
        html += '</tr><tr><th>Mitarbeiter</th>';
        for (let month = 0; month < 12; month++) {
            for (let day = 1; day <= daysInMonth[month]; day++) {
                html += `<th>${day}</th>`;
            }
        }
        html += '</tr></thead><tbody>';

        [...employees].sort().forEach(employee => {
            html += `<tr><td>${employee}</td>`;
            for (let month = 0; month < 12; month++) {
                for (let day = 1; day <= daysInMonth[month]; day++) {
                    const dateStr = `${currentYear}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    const date = new Date(currentYear, month, day);
                    const entryType = getEntryForDate(employee, dateStr);
                    let cls = '', content = '';
                    if (entryType === 'vacation') { cls = 'vacation'; content = 'U'; }
                    else if (entryType === 'sick')  { cls = 'sick';     content = 'K'; }
                    else if (isWeekend(date))       { cls = 'weekend';  content = '·'; }
                    html += `<td class="${cls}" data-employee="${employee}" data-date="${dateStr}">${content}</td>`;
                }
            }
            html += '</tr>';
        });
        html += '</tbody>';
        table.innerHTML = html;

        table.querySelectorAll('td:not(:first-child)').forEach(cell => {
            cell.addEventListener('click', function() {
                const employee = this.dataset.employee;
                const date = this.dataset.date;
                if (this.textContent && this.textContent !== '·' && !this.classList.contains('weekend')) {
                    deleteSingleDay(employee, date);
                }
            });
        });
        updateStats();
    }

    function deleteSingleDay(employee, dateStr) {
        if (!entries[employee]) return;
        const newEntries = []; let dayDeleted = false;
        entries[employee].forEach(entry => {
            if (isDateInRange(dateStr, entry.start, entry.end)) {
                dayDeleted = true;
                if (entry.start === entry.end) return;
                if (dateStr === entry.start) { newEntries.push({ start: addDays(dateStr, 1), end: entry.end, type: entry.type }); }
                else if (dateStr === entry.end) { newEntries.push({ start: entry.start, end: addDays(dateStr, -1), type: entry.type }); }
                else { newEntries.push({ start: entry.start, end: addDays(dateStr, -1), type: entry.type }); newEntries.push({ start: addDays(dateStr, 1), end: entry.end, type: entry.type }); }
            } else { newEntries.push(entry); }
        });
        entries[employee] = newEntries;
        if (dayDeleted) { generateTable(); saveData(); }
    }

    function addDays(dateStr, days) {
        const date = new Date(dateStr + 'T12:00:00');
        date.setDate(date.getDate() + days);
        return date.toISOString().split('T')[0];
    }

    function updateStats() {
        const statsContainer = document.getElementById('statsContainer');
        if (employees.length === 0) { statsContainer.innerHTML = ''; return; }
        let totalVacation = 0, totalSick = 0;
        const statsHtml = [...employees].sort().map(employee => {
            let vacationDays = 0, sickDays = 0;
            if (entries[employee]) {
                entries[employee].forEach(entry => {
                    const start = new Date(entry.start), end = new Date(entry.end);
                    const days = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    if (entry.type === 'vacation') vacationDays += days;
                    else if (entry.type === 'sick') sickDays += days;
                });
            }
            totalVacation += vacationDays; totalSick += sickDays;
            return `<div class="stat-card"><h4>${employee}</h4><div>Urlaub: <span class="stat-value">${vacationDays}</span> Tage</div><div>Krank: <span class="stat-value">${sickDays}</span> Tage</div></div>`;
        }).join('');
        statsContainer.innerHTML = statsHtml + `<div class="stat-card"><h4>Gesamt</h4><div>Urlaub: <span class="stat-value">${totalVacation}</span> Tage</div><div>Krank: <span class="stat-value">${totalSick}</span> Tage</div></div>`;
    }

    function clearAllData() {
        if (confirm('Möchten Sie wirklich alle Daten löschen? Diese Aktion kann nicht rückgängig gemacht werden.')) {
            employees = []; entries = {};
            Object.keys(localStorage).filter(key => key.startsWith('jahresplaner_')).forEach(key => localStorage.removeItem(key));
            updateEmployeeSelect(); generateTable();
        }
    }

    window.addEventListener('load', function() {
        document.getElementById('yearDisplay').textContent = currentYear;
        loadData();
        if (employees.length === 0) generateTable();
    });
    window.addEventListener('beforeunload', function() { if (employees.length > 0) saveData(); });
</script>
</body>
</html>
